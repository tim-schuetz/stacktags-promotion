<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Stacktags element — outro (demo)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../_shared/theme.css">
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#fff;}
  .wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  .stage{position:relative;width:1080px;height:1920px;overflow:hidden;transform-origin:center;flex-shrink:0;}

  .ec{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:34px;}

  /* logo — built layer by layer (groups emitted by outro.js) */
  #logo{display:flex;}
  #logo svg{width:620px;height:auto;display:block;}
  .lyr{
    opacity:0;
    transform:translateY(-52px) scale(.78);
    transform-box:fill-box;transform-origin:50% 50%;
    transition:transform .58s cubic-bezier(.34,1.56,.5,1) var(--d), opacity .42s ease var(--d);
  }
  #stage.play .lyr{opacity:1;transform:none;}
  /* chevrons draw in once the stack has landed */
  .chev path{stroke-dasharray:300;stroke-dashoffset:300;transition:stroke-dashoffset .55s ease .40s;}
  #stage.play .chev path{stroke-dashoffset:0;}

  /* wordmark — stack(ink) + tags(teal) */
  .wm{
    font-family:'Nunito',system-ui,sans-serif;font-weight:900;font-size:158px;
    letter-spacing:-3px;line-height:1;
    opacity:0;transform:translateY(30px);
    transition:opacity .5s ease .52s, transform .62s cubic-bezier(.2,.8,.2,1) .52s;
  }
  #stage.play .wm{opacity:1;transform:none;}
  .wm .s{color:#232B33;}
  .wm .t{color:#3EAE93;}

  /* url */
  .url{
    font-family:'Nunito',system-ui,sans-serif;font-weight:700;font-size:44px;
    letter-spacing:7px;color:#8a949d;
    opacity:0;transform:translateY(16px);
    transition:opacity .5s ease .74s, transform .5s ease .74s, letter-spacing .7s ease .74s;
  }
  #stage.play .url{opacity:1;transform:none;letter-spacing:4px;}
</style>
</head>
<body>
<div class="wrap"><div class="stage stk-grid-bg" id="stage">
  <div class="ec">
    <div id="logo"></div>
    <div class="wm"><span class="s">stack</span><span class="t">tags</span></div>
    <div class="url">stacktags.io</div>
  </div>
</div></div>

<script src="outro.js"></script>
<script>
  const stage = document.getElementById('stage');
  function fit(){ const s=Math.min(innerWidth/1080, innerHeight/1920); stage.style.transform='scale('+s+')'; }
  addEventListener('resize', fit); fit();

  document.getElementById('logo').innerHTML = window.makeStacktagsLogo({ size: 620 });

  window.__demoReady = Promise.resolve();

  // SFX: one swoosh as the stack flies in and assembles.
  window.DEMO = {
    duration: 2.8,
    settleMs: 300,
    sfx: [{ sound: 'swoosh', t: 0.12, vol: 0.85 }],
  };

  window.__demoPlay = function () {
    stage.classList.add('play');
  };
</script>
<script src="../_shared/viewer.js"></script>
</body>
</html>
