<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Stacktags element — figures with speech bubbles (demo)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../_shared/theme.css">
<link rel="stylesheet" href="figure.css">
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0b0e0d;}
  .wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  .stage{position:relative;width:1080px;height:1920px;overflow:hidden;transform-origin:center;flex-shrink:0;background:#fff;}
</style>
</head>
<body>
<div class="wrap"><div class="stage stk-grid-bg" id="stage">
  <div class="fig-scene" id="scene">
    <div class="fig-stage">
      <!-- the shared written character (what everyone WROTE) -->
      <span class="fig-parch"><svg viewBox="0 0 240 320" xmlns="http://www.w3.org/2000/svg" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect x="40" y="46" width="160" height="232" rx="8" fill="#f4ecd4" stroke="#232B33" stroke-width="6"/>
        <rect x="26" y="32" width="188" height="30" rx="15" fill="#decba0" stroke="#232B33" stroke-width="6"/>
        <rect x="26" y="266" width="188" height="30" rx="15" fill="#decba0" stroke="#232B33" stroke-width="6"/>
        <text x="120" y="192" text-anchor="middle" font-family="'Noto Sans SC',sans-serif" font-weight="900" font-size="118" fill="#232B33">字</text>
      </svg></span>

      <!-- two figures who SPEAK differently (garbled bubbles) -->
      <img class="fig fig-a" src="assets/figure_a_cut.png" alt="" onerror="this.style.display='none'">
      <img class="fig fig-b" src="assets/figure_b_cut.png" alt="" onerror="this.style.display='none'">
      <div class="fig-bub fig-bub-l">%$#!</div>
      <div class="fig-bub fig-bub-r">#@¿!</div>

      <!-- the authority figure drops in from the top, over the others -->
      <div class="fig-official-wrap">
        <div class="off-bub">#$°%!</div>
        <img class="fig-official" src="assets/official_cut.png" alt="" onerror="this.style.display='none'">
      </div>
    </div>
  </div>
</div></div>

<script>
  const stage = document.getElementById('stage');
  function fit(){ const s=Math.min(innerWidth/1080, innerHeight/1920); stage.style.transform='scale('+s+')'; }
  addEventListener('resize', fit); fit();

  window.__demoReady = Promise.resolve();
  window.DEMO = {
    duration: 5.6,
    settleMs: 300,
    sfx: [{ sound: 'swoosh', t: 0.5, vol: 0.6 }, { sound: 'swoosh', t: 2.6, vol: 0.85 }],
  };
  window.__demoPlay = function () {
    const scene = document.getElementById('scene');
    scene.classList.remove('speak', 'official');
    void scene.offsetWidth;
    scene.classList.add('speak');                                  // two figures + comic bubbles pop in
    setTimeout(() => { scene.classList.add('official'); }, 2600);  // official drops in from the top with its bubble
  };
</script>
<script src="../_shared/viewer.js"></script>
</body>
</html>
