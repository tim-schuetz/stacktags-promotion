<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Stacktags element — donut chart (demo)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../_shared/theme.css">
<link rel="stylesheet" href="../_engine/pie-chart.css">
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0b0e0d;}
  .wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  .stage{position:relative;width:1080px;height:1920px;overflow:hidden;transform-origin:center;flex-shrink:0;}
</style>
</head>
<body>
<div class="wrap"><div class="stage stk-grid-bg" id="stage">
  <div id="host"></div>
</div></div>

<script src="../_engine/pie-chart.js"></script>
<script>
  const stage = document.getElementById('stage');
  function fit(){ const s=Math.min(innerWidth/1080, innerHeight/1920); stage.style.transform='scale('+s+')'; }
  addEventListener('resize', fit); fit();

  const chart = new StacktagsPieChart('#host', {
    donut: true,
    legend: 'arc',
    data: [
      { label: 'Anleihen',     value: 42 },
      { label: 'Put Optionen', value: 24 },
      { label: 'Leerverkäufe', value: 20 },
      { label: 'XEON / XFFE',  value: 14 },
    ],
  });

  window.DEMO = {
    duration: 3.4,
    settleMs: 500,
    sfx: [{ sound: 'swoosh', t: 0.15, vol: 0.8 }],
  };
  window.__demoReady = Promise.resolve();
  window.__demoPlay = function () { chart.draw({ duration: 1700 }); };
</script>
<script src="../../_shared/viewer.js"></script>
</body>
</html>
