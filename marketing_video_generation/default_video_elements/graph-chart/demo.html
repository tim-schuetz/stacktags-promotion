<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Stacktags element — graph chart (demo)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../_shared/theme.css">
<link rel="stylesheet" href="graph-chart.css">
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0b0e0d;}
  .wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  .stage{position:relative;width:1080px;height:1920px;overflow:hidden;transform-origin:center;flex-shrink:0;}
</style>
</head>
<body>
<div class="wrap"><div class="stage stk-grid-bg" id="stage">
  <div id="host"></div>
</div></div>

<script src="graph-chart.js"></script>
<script>
  const stage = document.getElementById('stage');
  function fit(){ const s=Math.min(innerWidth/1080, innerHeight/1920); stage.style.transform='scale('+s+')'; }
  addEventListener('resize', fit); fit();

  const chart = new StacktagsGraphChart('#host', {
    type: 'line',
    showValue: true,
    valueSuffix: '',
    data: [
      { label:'W1', value: 120 }, { label:'W2', value: 180 }, { label:'W3', value: 240 },
      { label:'W4', value: 360 }, { label:'W5', value: 520 }, { label:'W6', value: 690 },
      { label:'W7', value: 880 }, { label:'W8', value: 1240 }, { label:'W9', value: 1610 },
      { label:'W10', value: 2050 }, { label:'W11', value: 2680 }, { label:'W12', value: 3400 },
    ],
  });

  window.DEMO = {
    duration: 3.4,
    settleMs: 500,
    sfx: [],
  };
  window.__demoReady = Promise.resolve();
  window.__demoPlay = function () { chart.draw({ duration: 2200 }); };
</script>
<script src="../_shared/viewer.js"></script>
</body>
</html>
