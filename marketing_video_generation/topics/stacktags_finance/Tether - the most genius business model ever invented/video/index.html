<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tether — the most genius business model ever invented</title>
<link rel="icon" href="data:," />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">

<!-- shared theme tokens + grid + subtitles (the design system) -->
<link rel="stylesheet" href="elements/theme.css">
<!-- the dynamic depth-grid look (we reuse its grid styling) -->
<link rel="stylesheet" href="elements/depth-transitions.css">
<!-- this video's own scene styling -->
<link rel="stylesheet" href="styles.css?v=1">
</head>
<body>
<div class="wrap">
  <div class="stage stk-grid-bg" id="stage">

    <!-- persistent dynamic grid: the camera (zoom/pan) lives here -->
    <div class="stk-depth2-grid" id="grid"></div>

    <!-- all scene layers stack here -->
    <div class="scenes" id="scenes">

      <!-- ===== 1 · HOOK: corner stat texts ===== -->
      <div class="scene" id="sc-headlines">
        <div class="hook2">
          <div class="stat tl" id="stat-emp"><div class="s-big">100</div><div class="s-small">Employees</div></div>
          <div class="stat tr" id="stat-prof"><div class="s-big">13B</div><div class="s-small">in 2024</div></div>
        </div>
      </div>

      <!-- ===== 2 · MECHANIC: $1 → USDT → vault (recurring motif) ===== -->
      <div class="scene" id="sc-mechanic">
        <div class="mech" id="mech">
          <img class="mech-figure" src="assets/figures/trader_cut.png" alt="">
          <img class="mech-vault" src="assets/photos/vault_dashed.png" alt="" onerror="this.style.display='none'">
          <img class="mech-bill" src="assets/photos/dollar_dashed.png" alt="">
          <div class="usdt mech-token"><span class="tk">₮</span></div>
        </div>
      </div>

      <!-- ===== 3 · WHAT IT IS: peg + trader + swap ===== -->
      <div class="scene" id="sc-usdt">
        <div class="usdtwrap" id="usdtwrap">
          <!-- peg: token + dollar locked -->
          <div class="peg" id="peg">
            <div class="usdt peg-token"><span class="tk">₮</span></div>
            <div class="peg-link">=</div>
            <img class="peg-bill" src="assets/photos/dollar_dashed.png" alt="">
            <div class="peg-eq">1 USDT&nbsp;=&nbsp;$1</div>
          </div>
          <!-- trader -->
          <img class="ux-trader" src="assets/figures/trader_cut.png" alt="">
          <!-- Tether <-> BTC swap cycle (right of the trader) -->
          <div class="ux-cycle" id="ux-cycle">
            <svg class="cyc-arrows" viewBox="0 0 240 240" fill="none">
              <path d="M44 150 A 80 80 0 0 1 172 68" stroke="#35A292" stroke-width="11" stroke-linecap="round"/>
              <path d="M172 68 l 6 -33 l -31 13 z" fill="#35A292"/>
              <path d="M196 90 A 80 80 0 0 1 68 172" stroke="#35A292" stroke-width="11" stroke-linecap="round"/>
              <path d="M68 172 l -6 33 l 31 -13 z" fill="#35A292"/>
            </svg>
            <div class="cyc-rot" id="cyc-rot">
              <div class="cyc-coin usdt c-left"><span class="tk">₮</span></div>
              <div class="cyc-coin btc c-right"><span class="tk">₿</span></div>
            </div>
          </div>
          <!-- swap pops: hand a dollar, get a minted token -->
          <img class="ux-swapbill" src="assets/photos/dollar_dashed.png" alt="">
          <div class="usdt ux-swaptoken"><span class="tk">₮</span></div>
        </div>
      </div>

      <!-- ===== 4 · THE TRICK: vault + realistic T-bill, cash arc, 0% holder ===== -->
      <div class="scene" id="sc-trick">
        <div class="trick" id="trick">
          <img class="tr-vault" src="assets/photos/vault_dashed.png" alt="">
          <img class="tr-tbill" src="assets/photos/tbill_real_dashed.png" alt="">
          <img class="tr-cash" src="assets/photos/cash_cut.png" alt="">
          <!-- the holder gets 0% (flies in below the vault) -->
          <div class="tr-holder" id="tr-holder">
            <img class="tr-person" src="assets/figures/trader_cut.png" alt="">
            <div class="tr-zero" id="tr-zero"><span class="tz-arrow"></span><span class="tz-pct">0%</span></div>
          </div>
        </div>
      </div>

      <!-- ===== 6 · SCALE: $100B odometer + crowd ===== -->
      <div class="scene" id="sc-scale">
        <div class="scale" id="scale">
          <div class="sc-odo" id="odo">$0</div>
          <div class="sc-sub">of other people's money — working for free</div>
          <div class="sc-crowd" id="sc-crowd"></div>
        </div>
      </div>

      <!-- ===== 7 · COST OF CAPITAL: bank→depositors, company→bonds (cash flows); Tether keeps it ===== -->
      <div class="scene" id="sc-cost">
        <div class="cost" id="cost">
          <div class="cost-row r-bank">
            <div class="cost-ent"><img class="cost-fig bld" src="assets/photos/bank2_cut.png" alt=""><div class="cost-lab">bank</div></div>
            <div class="cost-arrow"><div class="cost-cash"><img src="assets/photos/cash_cut.png" alt=""></div></div>
            <div class="cost-ent"><img class="cost-fig dst" src="assets/photos/depositors_cut.png" alt=""><div class="cost-lab sub">depositors</div></div>
          </div>
          <div class="cost-row r-co">
            <div class="cost-ent"><img class="cost-fig bld" src="assets/photos/company2_cut.png" alt=""><div class="cost-lab">company</div></div>
            <div class="cost-arrow"><div class="cost-cash"><img src="assets/photos/cash_cut.png" alt=""></div></div>
            <div class="cost-ent"><img class="cost-fig dst" src="assets/photos/bonds_cut.png" alt=""><div class="cost-lab sub">bonds</div></div>
          </div>
          <div class="cost-row r-tether">
            <div class="cost-ent"><img class="cost-fig" src="assets/figures/founder_cut.png" alt=""><div class="cost-lab">Tether</div></div>
            <div class="cost-arrow none"><div class="cost-x">✕</div></div>
            <div class="cost-ent"><div class="cost-nothing"></div></div>
          </div>
        </div>
      </div>

      <!-- ===== 8 · ROOM GAG: $13B profit, tiny team ===== -->
      <div class="scene" id="sc-room">
        <div class="room" id="room">
          <div class="room-floor"></div>
          <div class="room-team" id="room-team"></div>
          <div class="room-stack" id="room-stack">
            <div class="room-amt">$13B</div>
            <div class="room-amt-sub">2024 profit</div>
          </div>
        </div>
      </div>

      <!-- ===== 9 · THE CATCH: the trust tower ===== -->
      <div class="scene" id="sc-catch">
        <div class="catch" id="catch">
          <div class="tw-thread"></div>
          <div class="tw-trust">TRUST</div>
          <div class="tower" id="tower">
            <div class="usdt tw-token"><span class="tk">₮</span></div>
            <div class="tw-tbills" id="tw-tbills"></div>
            <img class="tw-vault" src="assets/photos/vault_dashed.png" alt="">
          </div>
        </div>
      </div>

      <!-- ===== 10 · ATTESTATIONS: grinning Tether founder w/ list, cash pile, dashed dollars rain ===== -->
      <div class="scene" id="sc-audit">
        <div class="audit" id="audit">
          <img class="au-founder" src="assets/figures/founder_list_grin_cut.png" alt="">
          <img class="au-cash" src="assets/photos/cash_cut.png" alt="">
          <div class="au-rain" id="au-rain"></div>
        </div>
      </div>

      <!-- ===== 11 · PUNCHLINE: charts fade → token on throne of T-bills ===== -->
      <div class="scene" id="sc-punch">
        <div class="punch" id="punch">
          <div class="pu-noise" id="pu-noise"></div>
          <div class="throne" id="throne">
            <div class="usdt th-token"><span class="tk">₮</span></div>
            <div class="th-stack" id="th-stack"></div>
            <div class="th-glow"></div>
          </div>
        </div>
      </div>

      <!-- ===== 12 · OUTRO endcard ===== -->
      <div class="scene" id="sc-outro">
        <div class="ec" id="outro-ec">
          <div id="outro-logo"></div>
          <div class="wm"><span class="s">stack</span><span class="t">tags</span></div>
          <div class="url">stacktags.io</div>
        </div>
      </div>

    </div><!-- /scenes -->

    <!-- subtitles mirror the narration -->
    <div class="stk-subs" id="subs"><span class="stk-subs-line" id="subs-line"></span></div>

  </div><!-- /stage -->
</div>

<!-- HUD (hidden in clean/capture mode) -->
<div id="hud">
  <button id="btn-play">▶ Play</button>
  <input id="seek" type="range" min="0" max="122" step="0.01" value="0" />
  <span id="tcode">0.0</span>
</div>

<audio id="vo" src="../script_voice.mp3" preload="auto"></audio>

<!-- default elements (used as components) -->
<script src="elements/outro.js"></script>

<!-- this video's choreography -->
<script src="app.js?v=1"></script>
</body>
</html>
