<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Tether — thumbnail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --teal:#35A292; --teal-d:#119271; --teal-soft:#e7f4ef; --ink:#141a1e; --muted:#7f8a92; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{ font-family:'Inter',system-ui,sans-serif; background:#1b1f23; }
  .thumb{ position:relative; width:1280px; height:720px; overflow:hidden;
    background:#f5f7f6; -webkit-font-smoothing:antialiased; }
  .thumb::before{ content:''; position:absolute; inset:0;
    background-image:
      linear-gradient(to right, rgba(35,43,51,.05) 3px, transparent 3px),
      linear-gradient(to bottom, rgba(35,43,51,.05) 3px, transparent 3px);
    background-size:96px 96px; }
  .chart{ position:absolute; right:-30px; bottom:-20px; width:820px; height:560px; opacity:.42; z-index:1; }

  .copy{ position:absolute; left:74px; top:118px; z-index:6; width:660px; }
  .eyebrow{ display:inline-block; font-weight:800; font-size:25px; letter-spacing:4px;
    text-transform:uppercase; color:var(--teal-d); background:var(--teal-soft);
    padding:9px 18px; border-radius:999px; margin-bottom:30px; }
  .hl{ margin:0; font-weight:900; letter-spacing:-0.035em; line-height:0.98; color:var(--ink); font-size:104px; }
  .hl .accent{ color:var(--teal); }
  .sub{ margin-top:34px; font-weight:800; font-size:33px; letter-spacing:-.5px; color:var(--muted); }
  .sub b{ color:var(--teal-d); }

  .stagev{ position:absolute; right:120px; top:50%; transform:translateY(-46%); z-index:5;
    display:flex; flex-direction:column; align-items:center; }
  .glow{ position:absolute; right:78px; top:40%; transform:translateY(-50%);
    width:580px; height:580px; border-radius:50%;
    background:radial-gradient(circle, rgba(53,162,146,.5), transparent 60%); z-index:3; }
  .usdt{ --d:320px; width:var(--d); height:var(--d); border-radius:50%; position:relative; z-index:5;
    background:radial-gradient(circle at 36% 30%, #74d3c2 0%, #35A292 52%, #119271 100%);
    box-shadow:inset 0 10px 28px rgba(255,255,255,.5), inset 0 -20px 38px rgba(6,58,44,.32),
               0 30px 60px rgba(53,162,146,.5);
    display:flex; align-items:center; justify-content:center; }
  .usdt::after{ content:''; position:absolute; inset:calc(var(--d)*0.09); border-radius:50%;
    box-shadow:inset 0 0 0 calc(var(--d)*0.018) rgba(255,255,255,.6); }
  .usdt .tk{ font-weight:900; color:#fff; font-size:calc(var(--d)*0.52); line-height:1;
    text-shadow:0 4px 16px rgba(6,58,44,.4); }
  .throne{ display:flex; flex-direction:column; align-items:center; margin-top:-14px; z-index:4; }
  .throne .tb{ height:48px; border-radius:9px; margin-top:-4px; overflow:hidden;
    background:linear-gradient(180deg, var(--teal) 0 11px, #fff 11px);
    box-shadow:0 12px 24px rgba(16,50,40,.2); }
  .cash{ position:absolute; right:430px; bottom:54px; width:230px; z-index:4;
    filter:drop-shadow(0 18px 26px rgba(16,50,40,.26)) rotate(-7deg); }
</style>
</head>
<body>
<div class="thumb" id="thumb">
  <svg class="chart" viewBox="0 0 820 560" fill="none">
    <path d="M20 510 L170 470 L290 490 L420 350 L540 380 L680 180 L800 50"
      stroke="#35A292" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M20 510 L170 470 L290 490 L420 350 L540 380 L680 180 L800 50 L800 560 L20 560 Z"
      fill="#35A292" opacity="0.10"/>
  </svg>

  <div class="copy">
    <div class="eyebrow">The genius of Tether</div>
    <h1 class="hl">100 staff.<br><span class="accent">$13B</span> profit.<br>It’s legal.</h1>
    <div class="sub">Give them <b>$1</b> — they keep the dollar.</div>
  </div>

  <img class="cash" src="assets/cash_dashed.png" alt="">
  <div class="glow"></div>
  <div class="stagev">
    <div class="usdt"><span class="tk">₮</span></div>
    <div class="throne">
      <div class="tb" style="width:150px"></div>
      <div class="tb" style="width:210px"></div>
      <div class="tb" style="width:262px"></div>
      <div class="tb" style="width:312px"></div>
    </div>
  </div>
</div>
</body>
</html>
