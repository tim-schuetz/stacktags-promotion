<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Why are there so many crypto coins?</title>
<link rel="icon" href="data:," />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Nunito:wght@700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<!-- shared theme tokens + grid + subtitles (the design system) -->
<link rel="stylesheet" href="elements/theme.css">
<!-- default elements used as components -->
<link rel="stylesheet" href="elements/graph-chart.css">
<link rel="stylesheet" href="elements/text-popup.css">
<link rel="stylesheet" href="elements/enumeration.css">
<!-- this video's own scene styling -->
<link rel="stylesheet" href="styles.css?v=1">
</head>
<body>
<div class="wrap">
  <div class="stage stk-grid-bg" id="stage">

    <!-- persistent dynamic grid: the camera (zoom/pan) lives here -->
    <div class="depth-grid" id="grid"></div>

    <!-- all scene layers stack here -->
    <div class="scenes" id="scenes">

      <!-- ===== HOOK: counter rocketing to millions ===== -->
      <div class="scene" id="sc-count"></div>

      <!-- ===== HOOK: a single Bitcoin, too slow ===== -->
      <div class="scene" id="sc-slow"></div>

      <!-- ===== WAVE 1: Bitcoin — one job ===== -->
      <div class="scene" id="sc-btc"></div>

      <!-- ===== WAVE 2: Ethereum — a platform ===== -->
      <div class="scene" id="sc-eth"></div>

      <!-- ===== WAVE 3: Ethereum congested — fees rising (chart host) ===== -->
      <div class="scene" id="sc-fees"><div class="fees-host" id="fees-host"></div></div>

      <!-- ===== WAVE 3: the rivals ===== -->
      <div class="scene" id="sc-rivals"></div>

      <!-- ===== WAVE 4: Pump.fun mint button ===== -->
      <div class="scene" id="sc-mint"></div>

      <!-- ===== WAVE 4: the memecoin flood (text-popup host) ===== -->
      <div class="scene" id="sc-flood"><div class="flood-host" id="flood-host"></div></div>

      <!-- ===== PUNCHLINE: the branching tree ===== -->
      <div class="scene" id="sc-tree"></div>

      <!-- ===== OUTRO ===== -->
      <div class="scene" id="sc-outro">
        <div class="ec" id="outro-ec">
          <div class="ec-follow" id="ec-follow">Follow</div>
          <div id="outro-logo"></div>
          <div class="wm"><span class="s">stack</span><span class="t">tags</span></div>
          <div class="url">stacktags.io</div>
        </div>
      </div>

    </div><!-- /scenes -->

    <!-- subtitles mirror the narration -->
    <div class="stk-subs" id="subs"><span class="stk-subs-line" id="subs-line"></span></div>

  </div><!-- /stage -->
</div>

<!-- HUD (hidden in clean/capture mode) -->
<div id="hud">
  <button id="btn-play">▶ Play</button>
  <input id="seek" type="range" min="0" max="81.5" step="0.01" value="0" />
  <span id="tcode">0.0</span>
</div>

<audio id="vo" src="../script_voice.mp3" preload="auto"></audio>

<!-- default elements (used as components) -->
<script src="elements/graph-chart.js"></script>
<script src="elements/text-popup.js"></script>
<script src="elements/enumeration.js"></script>
<script src="elements/outro.js"></script>

<!-- this video's choreography -->
<script src="app.js?v=1"></script>
</body>
</html>
