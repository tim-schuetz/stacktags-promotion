<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Why men underperform women at the stock market</title>
<link rel="icon" href="data:," />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">

<!-- shared theme tokens + grid + subtitles (the design system) -->
<link rel="stylesheet" href="elements/theme.css">
<!-- the dynamic depth-grid look (we reuse its grid styling) -->
<link rel="stylesheet" href="elements/depth-transitions.css">
<!-- default + custom elements used as components -->
<link rel="stylesheet" href="elements/graph-chart.css">
<link rel="stylesheet" href="elements/text-popup.css">
<link rel="stylesheet" href="elements/two-lines.css">
<link rel="stylesheet" href="elements/turnover-gauges.css">
<!-- this video's own scene styling -->
<link rel="stylesheet" href="styles.css?v=1">
</head>
<body>
<div class="wrap">
  <div class="stage stk-grid-bg" id="stage">

    <!-- persistent dynamic grid: the camera (zoom/pan) lives here -->
    <div class="stk-depth2-grid" id="grid"></div>

    <!-- all scene layers stack here -->
    <div class="scenes" id="scenes">

      <!-- HOOK -->
      <div class="scene" id="sc-open"></div>
      <div class="scene" id="sc-lines1"><div class="host" id="lines1-host"></div></div>
      <div class="scene" id="sc-study"><div class="host" id="study-host"></div></div>
      <div class="scene" id="sc-pros1"></div>

      <!-- WHY #1 — disposition effect -->
      <div class="scene" id="sc-glitch"></div>
      <div class="scene" id="sc-fifty"></div>
      <div class="scene" id="sc-tax"></div>
      <div class="scene" id="sc-pros2"></div>

      <!-- WHY #2 — overtrading & cost -->
      <div class="scene" id="sc-overtrade"><div class="host faint" id="overtrade-line"></div></div>
      <div class="scene" id="sc-fees"><div class="host" id="fees-host"></div></div>
      <div class="scene" id="sc-bars"><div class="host" id="bars-host"></div></div>
      <div class="scene" id="sc-cost"></div>

      <!-- WHY #3 — the men vs women gap -->
      <div class="scene" id="sc-gauges"><div class="host" id="gauges-host"></div></div>
      <div class="scene" id="sc-overconf"></div>

      <!-- OUTRO / CTA -->
      <div class="scene" id="sc-secret"><div class="host" id="secret-host"></div></div>
      <div class="scene" id="sc-outro">
        <div class="ec" id="outro-ec">
          <div id="outro-logo"></div>
          <div class="wm"><span class="s">stack</span><span class="t">tags</span></div>
          <div class="url">stacktags.io</div>
        </div>
      </div>

    </div><!-- /scenes -->

    <!-- subtitles mirror the narration -->
    <div class="stk-subs" id="subs"><span class="stk-subs-line" id="subs-line"></span></div>

  </div><!-- /stage -->
</div>

<!-- HUD (hidden in clean/capture mode) -->
<div id="hud">
  <button id="btn-play">▶ Play</button>
  <input id="seek" type="range" min="0" max="105.3" step="0.01" value="0" />
  <span id="tcode">0.0</span>
</div>

<audio id="vo" src="../script_voice.mp3" preload="auto"></audio>

<!-- default + custom elements (used as components) -->
<script src="elements/outro.js"></script>
<script src="elements/graph-chart.js"></script>
<script src="elements/text-popup.js"></script>
<script src="elements/two-lines.js"></script>
<script src="elements/turnover-gauges.js"></script>

<!-- this video's choreography -->
<script src="app.js?v=1"></script>
</body>
</html>
