<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Stacktags — How to launder $1.5 billion in crypto</title>
<link rel="icon" href="data:," />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Nunito:wght@700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="elements/theme.css" />
<link rel="stylesheet" href="elements/depth.css" />
<link rel="stylesheet" href="elements/enum-detail.css" />
<link rel="stylesheet" href="elements/bar-chart.css" />
<link rel="stylesheet" href="styles.css?v=1" />
</head>
<body>
<div class="root">
  <div class="stage" id="stage">

    <!-- top progress bar -->
    <div class="vprogress"><div class="vprogress-fill" id="vprogress"></div></div>

    <!-- opening bar chart (biggest crypto heists) -->
    <div class="layer chart-layer stk-grid-bg" id="chart-host">
      <div class="chart-title" id="chart-title">
        <span class="ct-1">Biggest crypto heists</span>
        <span class="ct-2">all-time, in&nbsp;US$&nbsp;millions</span>
      </div>
      <div class="chart-mount" id="chart-mount"></div>
    </div>

    <!-- main depth fly-through (draws its own moving grid) -->
    <div class="layer depth-layer" id="depth-host"></div>

    <!-- enumeration → stacked-logo (its own grid; persists as a corner badge) -->
    <div class="layer enum-layer" id="enum-host"></div>

    <!-- closing brand card (StacktagsOutro element) -->
    <div class="layer outro-layer" id="outro-host"></div>

    <!-- subtitles that mirror the narration -->
    <div class="stk-subs" id="subs"><span class="stk-subs-line" id="subline"></span></div>

  </div>

  <audio id="vo" src="../script_voice.mp3" preload="auto"></audio>

  <!-- control bar (hidden in clean mode with "C") -->
  <div class="hud" id="hud">
    <button id="play">▶ Play</button>
    <button id="restart">↺ Restart</button>
    <span class="info" id="info">0.0s</span>
    <button id="cleanbtn">Clean (C)</button>
  </div>
</div>

<script src="elements/depth.js"></script>
<script src="elements/enum-detail.js"></script>
<script src="elements/bar-chart.js"></script>
<script src="elements/outro.js"></script>
<script src="app.js?v=1"></script>
</body>
</html>
