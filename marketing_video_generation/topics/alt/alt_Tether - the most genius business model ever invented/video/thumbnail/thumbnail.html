<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Tether — thumbnail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#35A292; --teal-d:#119271; --teal-soft:#e7f4ef;
    --ink:#232B33; --ink2:#4a5560; --muted:#8a949d; --money:#3aa75e;
    --grid:rgba(35,43,51,.06);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ background:#1b1f23; }
  .thumb{
    position:relative; width:1280px; height:720px; overflow:hidden;
    background:#fff; font-family:'Inter',system-ui,sans-serif;
    background-image:
      linear-gradient(to right,  var(--grid) 2px, transparent 2px),
      linear-gradient(to bottom, var(--grid) 2px, transparent 2px);
    background-size:96px 96px; background-position:center;
    -webkit-font-smoothing:antialiased;
  }
  /* soft teal glow behind the coin */
  .glow{ position:absolute; right:140px; top:60px; width:620px; height:620px; border-radius:50%;
    background:radial-gradient(circle, rgba(53,162,146,.20), transparent 62%); pointer-events:none; }

  /* rising area chart, lower-right */
  .chart{ position:absolute; right:0; bottom:0; width:760px; height:520px; }

  /* the USDT coin */
  .coin{
    position:absolute; right:300px; top:96px; width:300px; height:300px; border-radius:50%;
    background:radial-gradient(circle at 36% 30%, #5fc9b4 0%, #35A292 55%, #119271 100%);
    box-shadow:inset 0 -14px 30px rgba(0,0,0,.16), 0 30px 70px rgba(53,162,146,.45);
    display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; z-index:5;
  }
  .coin svg{ width:46%; height:46%; }
  .coin .lbl{ font-weight:900; font-size:48px; letter-spacing:4px; margin-top:2px; }

  /* cash pile bottom-right */
  .cash{ position:absolute; right:70px; bottom:36px; width:430px; z-index:6;
    filter:drop-shadow(0 26px 36px rgba(20,40,33,.28)); }

  /* left text block */
  .left{ position:absolute; left:84px; top:0; height:100%; width:740px;
    display:flex; flex-direction:column; justify-content:center; z-index:7; }
  .eyebrow{ font-weight:800; font-size:23px; letter-spacing:5px; text-transform:uppercase; color:var(--teal); margin-bottom:22px; white-space:nowrap; }
  .h1{ font-weight:900; font-size:118px; line-height:.94; letter-spacing:-4px; color:var(--ink); }
  .h1 .g{ color:var(--money); }
  .h1 .t{ color:var(--teal-d); }
  .pill{ display:inline-flex; align-items:center; gap:16px; margin-top:40px; align-self:flex-start;
    background:var(--teal-soft); color:var(--teal-d); font-weight:900; font-size:40px; letter-spacing:-1px;
    padding:22px 40px; border-radius:999px; box-shadow:0 16px 36px rgba(16,50,40,.12); }
  .pill .arr{ color:var(--teal); }

  /* tiny brand mark bottom-left */
  .brand{ position:absolute; left:88px; bottom:44px; z-index:7;
    font-family:'Nunito',sans-serif; font-weight:900; font-size:40px; letter-spacing:-1.5px; }
  .brand .s{ color:var(--ink); } .brand .t{ color:var(--teal); }

  /* "legal" sticker */
  .legal{ position:absolute; right:80px; top:34px; z-index:8; transform:rotate(-9deg);
    background:var(--teal); color:#fff; font-weight:900; font-size:30px; letter-spacing:1px;
    padding:14px 26px; border-radius:18px; box-shadow:0 18px 40px rgba(53,162,146,.4); }
</style>
</head>
<body>
<div class="thumb" id="thumb">
  <div class="glow"></div>

  <svg class="chart" viewBox="0 0 760 520" preserveAspectRatio="none">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#35A292" stop-opacity="0.34"/>
        <stop offset="100%" stop-color="#35A292" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    <path d="M0,470 C140,450 230,420 330,360 C430,300 520,250 760,70 L760,520 L0,520 Z" fill="url(#g)"/>
    <path d="M0,470 C140,450 230,420 330,360 C430,300 520,250 760,70" fill="none" stroke="#35A292" stroke-width="9" stroke-linecap="round"/>
    <circle cx="760" cy="70" r="14" fill="#119271"/>
  </svg>

  <div class="legal">100% LEGAL</div>

  <div class="coin">
    <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <rect x="22" y="20" width="76" height="14" rx="4" fill="#fff"/>
      <rect x="52" y="20" width="16" height="80" rx="4" fill="#fff"/>
      <rect x="33" y="50" width="54" height="13" rx="4" fill="#fff"/>
    </svg>
    <div class="lbl">USDT</div>
  </div>

  <img class="cash" src="../assets/cash_pile.png" alt="" onerror="this.style.display='none'">

  <div class="left">
    <div class="eyebrow">the most genius business model</div>
    <div class="h1">You give<br>a <span class="g">$1</span>.</div>
    <div class="h1">They <span class="t">keep</span> it.</div>
    <div class="pill"><span>$0 cost</span><span class="arr">→</span><span>$13B profit</span></div>
  </div>

  <div class="brand"><span class="s">stack</span><span class="t">tags</span></div>
</div>
</body>
</html>
