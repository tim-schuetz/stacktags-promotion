<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>China rewrote its entire writing by government order</title>
<link rel="icon" href="data:," />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;700;900&text=龍龙鬱郁書书學学藝艺鐵铁聲声廳厅灣湾黨党憂忧豐丰豔艳籠笼羅罗關关難难繼继續续舊旧歲岁衛卫醫医嚴严屬属廣广麗丽龜龟馬马門门蛋旦餐歺繁体简二&display=swap" rel="stylesheet">

<link rel="stylesheet" href="elements/theme.css">
<link rel="stylesheet" href="elements/depth-transitions.css">
<link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
<div class="wrap">
  <div class="stage stk-grid-bg" id="stage">
    <div class="stk-depth2-grid" id="grid"></div>
    <div class="scenes" id="scenes">

      <!-- ===== HOOK — the question, and both answers, on one hero character ===== -->
      <div class="scene" id="sc-hook">
        <div class="cell">
          <div class="tzg"><span class="tzg-h"></span><span class="tzg-v"></span></div>
          <div class="glyph" id="hk-trad"></div>
          <div class="glyph" id="hk-simp"></div>
          <div class="glyph skel" id="hk-skel"></div>
          <div class="strike" id="hk-strike"></div>
          <div class="tick" id="hk-tick">✓</div>
        </div>
      </div>

      <!-- ===== WHY — writing as a barrier looming over the people who can't read it ===== -->
      <div class="scene" id="sc-wall">
        <div class="wall" id="wall"></div>
        <div class="photocard" id="wall-people"><img src="assets/img/people.png" alt="" /><span class="pc-cap">the literacy drive, 1950s</span></div>
      </div>

      <!-- ===== WHY 2 — one genuinely complex character + a stroke counter ===== -->
      <div class="scene" id="sc-complex">
        <div class="cell">
          <div class="tzg"><span class="tzg-h"></span><span class="tzg-v"></span></div>
          <div class="glyph" id="cx-char"></div>
          <div class="glyph" id="cx-simp"></div>
        </div>
        <div class="counter" id="cx-counter"><span class="cnum" id="cx-num">0</span><span class="clab">strokes</span></div>
        <div class="decree" id="cx-decree"><span class="seal"></span></div>
      </div>

      <!-- ===== TABLE — the spine: one table that fills over the whole video ===== -->
      <div class="scene" id="sc-table">
        <div class="rtable" id="rtable">
          <div class="rt-head">
            <div class="rt-h obj"></div>
            <div class="rt-h col-trad"><span class="cjk">繁体</span><span class="yr">traditional</span></div>
            <div class="rt-h col-simp"><span class="cjk">简体</span><span class="yr">1956</span></div>
            <div class="rt-h col-er"><span class="cjk">二简</span><span class="yr">1977</span></div>
          </div>
          <div class="rt-body" id="rt-body"></div>
        </div>
        <div class="yearstamp" id="tb-year">1956</div>
        <div class="tick" id="tb-tick">✓</div>
        <div class="bub bub-q" id="tb-bub">?!</div>
        <div class="rt-collabel simp" id="lab-simp"><span class="cjk">简体</span><span class="en">Mainland</span></div>
        <div class="rt-collabel trad" id="lab-trad"><span class="cjk">繁体</span><span class="en">Taiwan · Hong Kong</span></div>
      </div>

      <!-- ===== CHART — real literacy rates rising over the years ===== -->
      <div class="scene" id="sc-chart">
        <div class="chart" id="chart"></div>
      </div>

      <!-- ===== OUTRO ===== -->
      <div class="scene" id="sc-outro">
        <div class="ec" id="outro-ec">
          <div id="outro-logo"></div>
          <div class="wm"><span class="s">stack</span><span class="t">tags</span></div>
          <div class="url">stacktags.io</div>
        </div>
      </div>

    </div><!-- /scenes -->
    <div class="stk-subs" id="subs"><span class="stk-subs-line" id="subs-line"></span></div>
  </div><!-- /stage -->
</div>

<div id="hud">
  <button id="btn-play">&#9654; Play</button>
  <input id="seek" type="range" min="0" max="82" step="0.01" value="0" />
  <span id="tcode">0.0</span>
</div>

<audio id="vo" src="../script_voice.mp3" preload="auto"></audio>

<script src="elements/outro.js"></script>
<script src="assets/hanzi/hanzi.js"></script>
<script src="app.js?v=2"></script>
</body>
</html>
