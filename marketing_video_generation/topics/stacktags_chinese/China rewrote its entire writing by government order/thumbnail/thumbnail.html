<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>thumbnail — China rewrote its writing (Quer)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1c2630; --ink2:#4a5560; --muted:#8a949d;
    --teal:#35A292; --teal-d:#119271; --turq:#16A892; --teal-soft:#e7f4ef;
    --grid:rgba(35,43,51,0.06);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#1b1f23;}
  #thumb{position:relative;width:1280px;height:720px;overflow:hidden;background:#f6f9f8;
    font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  #thumb::before{content:'';position:absolute;inset:0;z-index:0;
    background-image:
      linear-gradient(to right, var(--grid) 3px, transparent 3px),
      linear-gradient(to bottom, var(--grid) 3px, transparent 3px);
    background-size:120px 120px;background-position:center center;}
  svg.chart{position:absolute;inset:0;z-index:1;}
  .year{position:absolute;z-index:4;font-weight:900;letter-spacing:2px;color:var(--ink);}
  .year .big{font-size:62px;}
  .year .cap{display:block;font-size:24px;font-weight:800;letter-spacing:5px;color:var(--muted);text-transform:uppercase;margin-top:2px;}
</style>
</head>
<body>
<div id="thumb">
  <svg class="chart" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <clipPath id="under" clipPathUnits="userSpaceOnUse">
        <path d="M96,602 C470,588 770,318 1206,158 L1206,720 L96,720 Z"></path>
      </clipPath>
      <linearGradient id="tint" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#119271" stop-opacity="0.18"></stop>
        <stop offset="0.5" stop-color="#119271" stop-opacity="0.05"></stop>
        <stop offset="1" stop-color="#1c2630" stop-opacity="0.18"></stop>
      </linearGradient>
      <filter id="softline" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#119271" flood-opacity="0.30"/>
      </filter>
    </defs>

    <!-- classroom photo, clipped to the area UNDER the rising line -->
    <g clip-path="url(#under)">
      <image href="../video/assets/img/people.png" x="86" y="150" width="1140" height="600"
             preserveAspectRatio="xMidYMid slice"></image>
      <rect x="86" y="150" width="1140" height="570" fill="url(#tint)"></rect>
    </g>

    <!-- axes -->
    <line x1="96" y1="120" x2="96" y2="636" stroke="rgba(35,43,51,.22)" stroke-width="4" stroke-linecap="round"></line>
    <line x1="96" y1="636" x2="1210" y2="636" stroke="rgba(35,43,51,.22)" stroke-width="4" stroke-linecap="round"></line>

    <!-- the rising literacy line, sitting on top of the photo's upper edge -->
    <path d="M96,602 C470,588 770,318 1206,158" fill="none" stroke="#fff" stroke-width="18" stroke-linecap="round"></path>
    <path d="M96,602 C470,588 770,318 1206,158" fill="none" stroke="var(--teal-d)" stroke-width="10" stroke-linecap="round" filter="url(#softline)"></path>

    <!-- arrowhead at the top-right end -->
    <path d="M1206,158 l-30,-2 l16,26 z" fill="var(--teal-d)"></path>

    <!-- markers where each variant sits on the timeline -->
    <circle cx="300" cy="563" r="11" fill="#fff" stroke="var(--teal-d)" stroke-width="6"></circle>
    <circle cx="640" cy="437" r="11" fill="#fff" stroke="var(--teal-d)" stroke-width="6"></circle>
    <circle cx="980" cy="247" r="11" fill="#fff" stroke="var(--teal-d)" stroke-width="6"></circle>

    <!-- the three dragon variants, climbing diagonally above the line -->
    <g id="dragons"></g>
  </svg>

  <div class="year" style="left:54px;top:648px;"><span class="big">1950</span></div>
</div>

<script src="../video/assets/hanzi/hanzi.js"></script>
<script>
(function(){
  var NS='http://www.w3.org/2000/svg';
  var host=document.getElementById('dragons');

  function place(char, cx, cy, D, color, opts){
    opts=opts||{};
    var strokes=(window.HANZI && window.HANZI[char] && window.HANZI[char].strokes)||[];
    var g=document.createElementNS(NS,'g');
    // map the 1024x1024 (origin bottom-left) glyph into a DxD box centred at (cx,cy)
    g.setAttribute('transform','translate('+(cx-D/2)+','+(cy-D/2)+') scale('+(D/1024)+') translate(0,1024) scale(1,-1)');
    // faint full ghost behind (the original, for the crumbling stage)
    if(opts.ghost){
      strokes.forEach(function(d){var p=document.createElementNS(NS,'path');p.setAttribute('d',d);
        p.setAttribute('fill',opts.ghostColor||'#1c2630');p.setAttribute('opacity','0.08');g.appendChild(p);});
    }
    strokes.forEach(function(d,i){
      var p=document.createElementNS(NS,'path');p.setAttribute('d',d);p.setAttribute('fill',color);
      if(opts.drift && opts.drift[i]){var v=opts.drift[i];
        p.style.transformBox='fill-box';p.style.transformOrigin='50% 50%';
        p.style.transform='translate('+v[0]+'px,'+v[1]+'px) rotate('+v[2]+'deg)';p.setAttribute('opacity','0.42');}
      else if(opts.faded && opts.faded[i]!=null){p.setAttribute('opacity',opts.faded[i]);}
      g.appendChild(p);
    });
    host.appendChild(g);
  }

  // 1) full traditional 龍 — heavy, complex, the "before"
  place('龍', 300, 405, 280, '#1c2630');
  // 2) 龍 mid-simplification — the right half cleanly shedding / fading away (the reform in progress)
  place('龍', 642, 300, 246, '#1c2630', {
    ghost:true, ghostColor:'#1c2630',
    drift:{12:[34,18,8],13:[30,30,-8],14:[52,26,12],15:[44,46,10]},
    faded:{10:0.30,11:0.26}
  });
  // 3) simplified 龙 — clean, modern, turquoise, the "after"
  place('龙', 978, 150, 216, '#119271');

  window.__ready = true;
})();
</script>
</body>
</html>
