<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>thumbnail — For 2,000 years (Quer)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;700;900&text=%E6%88%91%E4%B8%8D%E7%9F%A5%E9%81%93&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&text=%E5%90%BE%E4%B8%8D%E7%9F%A5&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#232B33; --ink2:#4a5560; --muted:#8a949d;
    --teal:#35A292; --teal-d:#119271; --turq:#16A892; --teal-soft:#e7f4ef;
    --grid:rgba(35,43,51,0.06);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#1b1f23;}
  #thumb{position:relative;width:1280px;height:720px;overflow:hidden;background:#fff;
    font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  #thumb::before{content:'';position:absolute;inset:0;
    background-image:
      linear-gradient(to right, var(--grid) 3px, transparent 3px),
      linear-gradient(to bottom, var(--grid) 3px, transparent 3px);
    background-size:120px 120px;background-position:center center;}
  .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5;}
  .blob.a{width:520px;height:520px;left:-160px;top:-150px;background:#cdeae1;}
  .blob.b{width:560px;height:560px;right:-200px;bottom:-160px;background:#d7efe8;}

  /* corner texts */
  .speak{position:absolute;left:74px;top:64px;z-index:5;white-space:nowrap;
    font-weight:900;font-size:104px;letter-spacing:-0.04em;line-height:.9;color:var(--ink);}
  .write{position:absolute;right:78px;bottom:64px;z-index:5;text-align:right;
    font-weight:900;font-size:104px;letter-spacing:-0.04em;line-height:.9;color:var(--turq);}

  /* the four villagers */
  .people{position:absolute;left:18px;bottom:-14px;width:660px;height:482px;z-index:3;
    background:url('../video/assets/img/crowd_cut.png') left bottom/contain no-repeat;
    filter:drop-shadow(0 22px 26px rgba(20,40,33,.16));}

  /* speech bubble (spoken), top-right, tail angled down-left toward the people */
  .bubble{position:absolute;right:96px;top:92px;width:520px;height:196px;z-index:6;}
  .bubble svg{position:absolute;left:0;top:0;width:520px;height:196px;overflow:visible;
    filter:drop-shadow(0 22px 40px rgba(20,40,33,.16));}
  .bubble .zh{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:'Noto Sans SC',sans-serif;font-weight:700;font-size:98px;color:var(--ink);}

  /* the written form, handwritten brush, directly under the bubble */
  .written{position:absolute;right:150px;top:300px;z-index:6;
    font-family:'Ma Shan Zheng',cursive;font-size:124px;line-height:1;color:var(--ink);
    transform:rotate(-3deg);}
</style>
</head>
<body>
<div id="thumb">
  <div class="blob a"></div><div class="blob b"></div>

  <div class="speak">Speak one.</div>

  <div class="people"></div>

  <div class="bubble">
    <svg viewBox="0 0 520 196" xmlns="http://www.w3.org/2000/svg">
      <path d="M40,0 H480 Q520,0 520,40 V156 Q520,196 480,196 H150 L24,268 L74,196 H40 Q0,196 0,156 V40 Q0,0 40,0 Z"
            fill="#ffffff" stroke="#232B33" stroke-width="9" stroke-linejoin="round"></path>
    </svg>
    <div class="zh">我不知道</div>
  </div>

  <div class="written">吾不知</div>

  <div class="write">Write<br>another.</div>
</div>
<script>
  (async () => { try { await document.fonts.ready; } catch (e) {} setTimeout(() => { window.__ready = true; }, 250); })();
</script>
</body>
</html>
