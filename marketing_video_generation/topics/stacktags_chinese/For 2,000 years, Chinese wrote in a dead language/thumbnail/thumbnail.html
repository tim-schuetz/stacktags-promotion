<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>thumbnail — For 2,000 years (Quer)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;700;900&text=我不知道吾&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#232B33; --ink2:#4a5560; --muted:#8a949d;
    --teal:#35A292; --teal-d:#119271; --turq:#16A892; --teal-soft:#e7f4ef;
    --grid:rgba(35,43,51,0.06);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#1b1f23;}
  #thumb{position:relative;width:1280px;height:720px;overflow:hidden;background:#fff;
    font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  #thumb::before{content:'';position:absolute;inset:0;
    background-image:
      linear-gradient(to right, var(--grid) 3px, transparent 3px),
      linear-gradient(to bottom, var(--grid) 3px, transparent 3px);
    background-size:120px 120px;background-position:center center;}
  .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5;}
  .blob.a{width:520px;height:520px;left:-160px;top:-150px;background:#cdeae1;}
  .blob.b{width:560px;height:560px;right:-200px;bottom:-160px;background:#d7efe8;}

  /* corner texts */
  .speak{position:absolute;left:74px;top:60px;z-index:5;
    font-weight:900;font-size:100px;letter-spacing:-0.035em;line-height:.9;color:var(--ink);}
  .write{position:absolute;right:78px;bottom:74px;z-index:5;text-align:right;
    font-weight:900;font-size:100px;letter-spacing:-0.035em;line-height:.9;color:var(--turq);}

  /* the four villagers, bottom-left */
  .people{position:absolute;left:18px;bottom:-14px;width:660px;height:482px;z-index:3;
    background:url('../video/assets/img/crowd_cut.png') left bottom/contain no-repeat;
    filter:drop-shadow(0 22px 26px rgba(20,40,33,.16));}

  /* speech bubble, top-right, tail pointing down-left toward the people */
  .bubble{position:absolute;right:120px;top:120px;z-index:4;background:#fff;border-radius:40px;
    padding:30px 56px;box-shadow:inset 0 0 0 9px var(--ink),0 26px 52px rgba(20,40,33,.18);}
  .bubble .tag{font-weight:800;font-size:26px;letter-spacing:4px;color:var(--muted);
    text-transform:uppercase;text-align:center;margin-bottom:6px;}
  .bubble .zh{font-family:'Noto Sans SC',sans-serif;font-weight:700;font-size:96px;line-height:1;
    color:var(--ink);white-space:nowrap;}
  /* tail: thick ink-outlined triangle pointing down-left toward the villagers */
  .bubble .tail{position:absolute;left:70px;top:100%;width:0;height:0;}
  .bubble .tail::before{content:'';position:absolute;top:-3px;left:-32px;
    border-left:24px solid transparent;border-right:40px solid transparent;border-top:62px solid var(--ink);}
  .bubble .tail::after{content:'';position:absolute;top:-14px;left:-19px;
    border-left:13px solid transparent;border-right:25px solid transparent;border-top:40px solid #fff;}

  /* the written form, a small scroll near 'Write another.' */
  .paper{position:absolute;right:96px;bottom:250px;z-index:4;background:#fff;border-radius:14px;
    padding:18px 34px;box-shadow:0 20px 42px rgba(20,40,33,.16),inset 0 0 0 3px rgba(35,43,51,.10);}
  .paper .tag{font-weight:800;font-size:22px;letter-spacing:4px;color:var(--muted);
    text-transform:uppercase;text-align:center;margin-bottom:4px;}
  .paper .zh{font-family:'Noto Sans SC',sans-serif;font-weight:700;font-size:62px;line-height:1;
    color:var(--ink);white-space:nowrap;letter-spacing:6px;}
</style>
</head>
<body>
<div id="thumb">
  <div class="blob a"></div><div class="blob b"></div>

  <div class="speak">Speak<br>one.</div>

  <div class="people"></div>

  <div class="bubble">
    <div class="tag">spoken</div>
    <div class="zh">我不知道</div>
    <div class="tail"></div>
  </div>

  <div class="paper">
    <div class="tag">written</div>
    <div class="zh">吾不知</div>
  </div>

  <div class="write">Write<br>another.</div>
</div>
<script>
  (async () => { try { await document.fonts.ready; } catch (e) {} setTimeout(() => { window.__ready = true; }, 200); })();
</script>
</body>
</html>
