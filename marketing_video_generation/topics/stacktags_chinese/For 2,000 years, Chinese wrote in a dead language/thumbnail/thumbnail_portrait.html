<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>thumbnail — For 2,000 years (Hochkant)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;700;900&text=%E6%88%91%E4%B8%8D%E7%9F%A5%E9%81%93&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&text=%E5%90%BE%E4%B8%8D%E7%9F%A5&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#232B33; --ink2:#4a5560; --muted:#8a949d;
    --teal:#35A292; --teal-d:#119271; --turq:#16A892; --teal-soft:#e7f4ef;
    --grid:rgba(35,43,51,0.06);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#1b1f23;}
  #thumb{position:relative;width:1080px;height:1920px;overflow:hidden;background:#fff;
    font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  #thumb::before{content:'';position:absolute;inset:0;
    background-image:
      linear-gradient(to right, var(--grid) 3px, transparent 3px),
      linear-gradient(to bottom, var(--grid) 3px, transparent 3px);
    background-size:118px 118px;background-position:center center;}
  .blob{position:absolute;border-radius:50%;filter:blur(85px);opacity:.5;}
  .blob.a{width:640px;height:640px;left:-220px;top:-170px;background:#cdeae1;}
  .blob.b{width:700px;height:700px;right:-260px;bottom:60px;background:#d7efe8;}

  /* TOP = spoken */
  .speak{position:absolute;left:84px;top:104px;z-index:5;
    font-weight:900;font-size:154px;letter-spacing:-0.04em;line-height:.86;color:var(--ink);}

  /* speech bubble (spoken), upper-right, tail angled down-left toward the people */
  .bubble{position:absolute;right:46px;top:300px;width:520px;height:196px;z-index:6;}
  .bubble svg{position:absolute;left:0;top:0;width:520px;height:196px;overflow:visible;
    filter:drop-shadow(0 22px 40px rgba(20,40,33,.16));}
  .bubble .zh{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:'Noto Sans SC',sans-serif;font-weight:700;font-size:98px;color:var(--ink);}

  /* MIDDLE = the four villagers */
  .people{position:absolute;left:50%;top:540px;transform:translateX(-50%);width:1130px;height:800px;z-index:3;
    background:url('../video/assets/img/crowd_cut.png') center bottom/contain no-repeat;
    filter:drop-shadow(0 24px 30px rgba(20,40,33,.16));}

  /* BOTTOM = written (handwritten brush 吾不知 left, turquoise headline lower-right, pulled close) */
  .written{position:absolute;left:62px;top:1408px;z-index:6;
    font-family:'Ma Shan Zheng',cursive;font-size:168px;line-height:1;color:var(--ink);
    transform:rotate(-3deg);}
  .write{position:absolute;right:84px;bottom:122px;z-index:5;text-align:right;
    font-weight:900;font-size:142px;letter-spacing:-0.04em;line-height:.88;color:var(--turq);}
</style>
</head>
<body>
<div id="thumb">
  <div class="blob a"></div><div class="blob b"></div>

  <div class="speak">Speak<br>one.</div>

  <div class="bubble">
    <svg viewBox="0 0 520 196" xmlns="http://www.w3.org/2000/svg">
      <path d="M40,0 H480 Q520,0 520,40 V156 Q520,196 480,196 H150 L24,268 L74,196 H40 Q0,196 0,156 V40 Q0,0 40,0 Z"
            fill="#ffffff" stroke="#232B33" stroke-width="9" stroke-linejoin="round"></path>
    </svg>
    <div class="zh">我不知道</div>
  </div>

  <div class="people"></div>

  <div class="written">吾不知</div>
  <div class="write">Write<br>another.</div>
</div>
<script>
  (async () => { try { await document.fonts.ready; } catch (e) {} setTimeout(() => { window.__ready = true; }, 250); })();
</script>
</body>
</html>
