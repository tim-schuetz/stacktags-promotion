<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>thumbnail — For 2,000 years (Hochkant)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;700;900&text=我不知道吾&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#232B33; --ink2:#4a5560; --muted:#8a949d;
    --teal:#35A292; --teal-d:#119271; --turq:#16A892; --teal-soft:#e7f4ef;
    --grid:rgba(35,43,51,0.06);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#1b1f23;}
  #thumb{position:relative;width:1080px;height:1920px;overflow:hidden;background:#f6f9f8;
    font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  #thumb::before{content:'';position:absolute;inset:0;
    background-image:
      linear-gradient(to right, var(--grid) 3px, transparent 3px),
      linear-gradient(to bottom, var(--grid) 3px, transparent 3px);
    background-size:118px 118px;background-position:center center;}
  .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5;}
  .blob.a{width:620px;height:620px;left:-200px;top:-160px;background:#cdeae1;}
  .blob.b{width:680px;height:680px;right:-240px;bottom:120px;background:#d7efe8;}

  .kicker{position:absolute;top:96px;left:0;right:0;text-align:center;
    font-weight:800;font-size:36px;letter-spacing:9px;color:var(--muted);text-transform:uppercase;}

  .speak{position:absolute;top:168px;left:84px;z-index:5;
    font-weight:900;font-size:160px;letter-spacing:-0.04em;line-height:.86;color:var(--ink);}

  /* speech bubble top-right, tail pointing down toward the people */
  .bubble{position:absolute;right:70px;top:300px;z-index:6;background:#fff;border-radius:36px;
    padding:24px 44px;box-shadow:inset 0 0 0 9px var(--ink),0 26px 52px rgba(20,40,33,.18);}
  .bubble .tag{font-weight:800;font-size:24px;letter-spacing:4px;color:var(--muted);
    text-transform:uppercase;text-align:center;margin-bottom:4px;}
  .bubble .zh{font-family:'Noto Sans SC',sans-serif;font-weight:700;font-size:84px;line-height:1;
    color:var(--ink);white-space:nowrap;}
  .bubble .tail{position:absolute;left:96px;top:100%;width:0;height:0;}
  .bubble .tail::before{content:'';position:absolute;top:-3px;left:-30px;
    border-left:30px solid transparent;border-right:30px solid transparent;border-top:58px solid var(--ink);}
  .bubble .tail::after{content:'';position:absolute;top:-14px;left:-17px;
    border-left:17px solid transparent;border-right:17px solid transparent;border-top:38px solid #fff;}

  /* the four villagers, centred */
  .people{position:absolute;left:50%;top:640px;transform:translateX(-50%);width:1010px;height:710px;z-index:3;
    background:url('../video/assets/img/crowd_cut.png') center bottom/contain no-repeat;
    filter:drop-shadow(0 24px 30px rgba(20,40,33,.16));}

  /* written form scroll */
  .paper{position:absolute;left:84px;bottom:430px;z-index:6;background:#fff;border-radius:14px;
    padding:16px 32px;box-shadow:0 20px 42px rgba(20,40,33,.16),inset 0 0 0 3px rgba(35,43,51,.10);}
  .paper .tag{font-weight:800;font-size:22px;letter-spacing:4px;color:var(--muted);
    text-transform:uppercase;text-align:center;margin-bottom:2px;}
  .paper .zh{font-family:'Noto Sans SC',sans-serif;font-weight:700;font-size:66px;line-height:1;
    color:var(--ink);white-space:nowrap;letter-spacing:6px;}

  .write{position:absolute;bottom:250px;right:84px;z-index:5;text-align:right;
    font-weight:900;font-size:160px;letter-spacing:-0.04em;line-height:.86;color:var(--turq);}

  .brand{position:absolute;left:0;right:0;bottom:104px;display:flex;align-items:center;justify-content:center;gap:20px;z-index:7;}
  .brand .wm{font-weight:900;font-size:76px;letter-spacing:-2px;}
  .brand .wm .s{color:var(--ink);} .brand .wm .t{color:var(--teal);}
</style>
</head>
<body>
<div id="thumb">
  <div class="blob a"></div><div class="blob b"></div>

  <div class="kicker">For 2,000 years</div>
  <div class="speak">Speak<br>one.</div>

  <div class="bubble">
    <div class="tag">spoken</div>
    <div class="zh">我不知道</div>
    <div class="tail"></div>
  </div>

  <div class="people"></div>

  <div class="paper">
    <div class="tag">written</div>
    <div class="zh">吾不知</div>
  </div>
  <div class="write">Write<br>another.</div>

  <div class="brand"><span class="wm"><span class="s">stack</span><span class="t">tags</span></span></div>
</div>
<script>
  (async () => { try { await document.fonts.ready; } catch (e) {} setTimeout(() => { window.__ready = true; }, 200); })();
</script>
</body>
</html>
