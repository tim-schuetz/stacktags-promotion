<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Thumbnail — The most complex Chinese character (Hochkant)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --teal:#35A292; --teal-d:#119271; --turq:#16A892; --ink:#1c2630; --ink-2:#4a5560; --muted:#8a949d;
    --grid:rgba(35,43,51,.06); }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1080px; height:1920px; overflow:hidden; }
  .tw{
    position:relative; width:1080px; height:1920px; background-color:#f6f9f8;
    background-image:
      linear-gradient(to right,  var(--grid) 3px, transparent 3px),
      linear-gradient(to bottom, var(--grid) 3px, transparent 3px);
    background-size:118px 118px; background-position:center;
    font-family:'Inter',sans-serif; color:var(--ink); overflow:hidden;
  }
  .blob{ position:absolute; border-radius:50%; filter:blur(80px); opacity:.5; }
  .blob.a{ width:640px; height:640px; left:-200px; top:-180px; background:#cdeae1; }
  .blob.b{ width:720px; height:720px; right:-260px; bottom:40px; background:#d7efe8; }

  .l1{ position:absolute; top:150px; left:0; right:0; text-align:center; z-index:4;
    font-weight:900; font-size:132px; letter-spacing:-4px; color:var(--ink); line-height:.95; }
  .l1 b{ color:var(--turq); font-weight:900; }

  .l2{ position:absolute; top:1606px; left:0; right:0; text-align:center; z-index:4;
    font-weight:900; font-size:108px; letter-spacing:-3px; color:var(--ink); line-height:.98; }
  .l2 u{ color:var(--turq); text-decoration:none; position:relative; }
  .l2 u::after{ content:""; position:absolute; left:0; right:0; bottom:6px; height:14px;
    background:rgba(22,168,146,.28); border-radius:7px; z-index:-1; }

  /* HERO: the 58-stroke character (upper-left) and the noodle bowl (lower-right) overlap on a diagonal */
  .biang{ position:absolute; left:44px; top:360px; width:720px; height:auto; z-index:2;
    filter:drop-shadow(0 16px 26px rgba(20,40,33,.14)); }
  .bowl{ position:absolute; right:36px; top:900px; width:560px; height:auto; z-index:3;
    transform:rotate(7deg);
    filter:drop-shadow(0 22px 30px rgba(20,40,33,.22)); }
</style>
</head>
<body>
<div class="tw">
  <div class="blob a"></div><div class="blob b"></div>

  <div class="l1"><b>58</b> strokes.</div>

  <img class="biang" src="../video/assets/img/biang.svg" alt="biáng" />
  <img class="bowl" src="../video/assets/img/noodles_dashed.png" alt="" />

  <div class="l2">for one <u>noodle</u>.</div>
</div>
</body>
</html>
