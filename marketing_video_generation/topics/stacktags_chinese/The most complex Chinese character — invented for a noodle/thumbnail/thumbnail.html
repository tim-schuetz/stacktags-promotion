<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Thumbnail — The most complex Chinese character</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --teal:#35A292; --teal-d:#119271; --teal-soft:#e7f4ef; --ink:#1c2630; --ink-2:#4a5560; --muted:#8a949d; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1080px; height:1920px; overflow:hidden; }
  .tw{
    position:relative; width:1080px; height:1920px;
    background-color:#f6f9f8;
    background-image:
      linear-gradient(to right,  rgba(35,43,51,.06) 3px, transparent 3px),
      linear-gradient(to bottom, rgba(35,43,51,.06) 3px, transparent 3px);
    background-size:118px 118px; background-position:center;
    font-family:'Inter',sans-serif; color:var(--ink); overflow:hidden;
  }
  .blob{ position:absolute; border-radius:50%; filter:blur(80px); opacity:.5; }
  .blob.a{ width:640px; height:640px; left:-200px; top:-180px; background:#cdeae1; }
  .blob.b{ width:720px; height:720px; right:-260px; bottom:40px; background:#d7efe8; }

  .eyebrow{
    position:absolute; top:120px; left:0; right:0; text-align:center;
    font-weight:800; font-size:36px; letter-spacing:7px; color:var(--muted);
  }

  .l1{ position:absolute; top:196px; left:0; right:0; text-align:center;
    font-weight:900; font-size:128px; letter-spacing:-4px; color:var(--ink); line-height:.95; }
  .l1 b{ color:var(--teal-d); font-weight:900; }

  .l2{ position:absolute; top:1392px; left:0; right:0; text-align:center;
    font-weight:900; font-size:104px; letter-spacing:-3px; color:var(--ink); line-height:.98; }
  .l2 u{ color:var(--teal-d); text-decoration:none; position:relative; }
  .l2 u::after{ content:""; position:absolute; left:0; right:0; bottom:6px; height:14px;
    background:rgba(53,162,146,.28); border-radius:7px; z-index:-1; }

  /* 田字格 practice cell holding the hero character */
  .cell{ position:absolute; left:50%; top:790px; width:780px; height:780px; transform:translate(-50%,-50%);
    box-shadow:inset 0 0 0 4px rgba(35,43,51,.12); border-radius:10px; background:rgba(255,255,255,.5); }
  .cell .ch{ position:absolute; left:7%; right:7%; top:50%; height:4px; transform:translateY(-50%);
    background:repeating-linear-gradient(to right, rgba(35,43,51,.16) 0 16px, transparent 16px 30px); }
  .cell .cv{ position:absolute; top:7%; bottom:7%; left:50%; width:4px; transform:translateX(-50%);
    background:repeating-linear-gradient(to bottom, rgba(35,43,51,.16) 0 16px, transparent 16px 30px); }
  .cell .hz{ position:absolute; left:50%; top:50%; width:88%; height:88%; transform:translate(-50%,-50%);
    object-fit:contain; filter:drop-shadow(0 18px 30px rgba(20,40,33,.12)); }

  /* small real noodle bowl tucked at the lower-right of the cell */
  .bowl{ position:absolute; right:96px; top:1150px; width:300px; height:auto;
    filter:drop-shadow(0 18px 28px rgba(20,40,33,.16)); }

  .brand{ position:absolute; left:0; right:0; bottom:104px; display:flex; align-items:center; justify-content:center; gap:22px; }
  .brand .wm{ font-weight:900; font-size:80px; letter-spacing:-2px; }
  .brand .wm .s{ color:var(--ink); } .brand .wm .t{ color:var(--teal); }
  .brand #logo svg{ width:122px; height:auto; display:block; }
</style>
</head>
<body>
<div class="tw">
  <div class="blob a"></div><div class="blob b"></div>

  <div class="eyebrow">LEARN CHINESE</div>

  <div class="l1"><b>58</b> strokes.</div>

  <div class="cell">
    <span class="ch"></span><span class="cv"></span>
    <img class="hz" src="../video/assets/img/biang.svg" alt="biáng" />
  </div>
  <img class="bowl" src="../video/assets/img/noodles_dashed.png" alt="" />

  <div class="l2">for one <u>noodle</u>.</div>

  <div class="brand">
    <span id="logo"></span>
    <span class="wm"><span class="s">stack</span><span class="t">tags</span></span>
  </div>
</div>

<script src="../video/elements/outro.js"></script>
<script>
  if (window.makeStacktagsLogo) document.getElementById('logo').innerHTML = window.makeStacktagsLogo({ size: 150 });
</script>
</body>
</html>
