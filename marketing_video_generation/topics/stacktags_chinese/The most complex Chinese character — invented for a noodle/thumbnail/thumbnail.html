<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Thumbnail — The most complex Chinese character (Quer)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --teal:#35A292; --teal-d:#119271; --turq:#16A892; --ink:#1c2630; --ink-2:#4a5560; --muted:#8a949d;
    --grid:rgba(35,43,51,.06); }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; background:#1b1f23; }
  #thumb{
    position:relative; width:1280px; height:720px; overflow:hidden; background-color:#f6f9f8;
    background-image:
      linear-gradient(to right,  var(--grid) 3px, transparent 3px),
      linear-gradient(to bottom, var(--grid) 3px, transparent 3px);
    background-size:120px 120px; background-position:center;
    font-family:'Inter',sans-serif; color:var(--ink); -webkit-font-smoothing:antialiased;
  }
  .blob{ position:absolute; border-radius:50%; filter:blur(80px); opacity:.5; }
  .blob.a{ width:520px; height:520px; left:-170px; top:-150px; background:#cdeae1; }
  .blob.b{ width:560px; height:560px; right:-200px; bottom:-160px; background:#d7efe8; }

  /* text column on the left */
  .l1{ position:absolute; top:150px; left:74px; z-index:4; white-space:nowrap;
    font-weight:900; font-size:104px; letter-spacing:-3px; color:var(--ink); line-height:.95; }
  .l1 b{ color:var(--turq); }
  .l2{ position:absolute; bottom:96px; left:74px; z-index:4; white-space:nowrap;
    font-weight:900; font-size:92px; letter-spacing:-3px; color:var(--ink); line-height:.98; }
  .l2 u{ color:var(--turq); text-decoration:none; position:relative; }
  .l2 u::after{ content:""; position:absolute; left:0; right:0; bottom:4px; height:12px;
    background:rgba(22,168,146,.28); border-radius:6px; z-index:-1; }

  /* HERO on the right: the 58-stroke character (upper) and the bowl (lower-right) overlap diagonally */
  .biang{ position:absolute; right:178px; top:40px; width:470px; height:auto; z-index:2;
    filter:drop-shadow(0 14px 24px rgba(20,40,33,.14)); }
  .bowl{ position:absolute; right:30px; bottom:-26px; width:404px; height:auto; z-index:3;
    transform:rotate(7deg);
    filter:drop-shadow(0 20px 28px rgba(20,40,33,.22)); }
</style>
</head>
<body>
<div id="thumb">
  <div class="blob a"></div><div class="blob b"></div>

  <div class="l1"><b>58</b> strokes.</div>

  <img class="biang" src="../video/assets/img/biang.svg" alt="biáng" />
  <img class="bowl" src="../video/assets/img/noodles_dashed.png" alt="" />

  <div class="l2">for one <u>noodle</u>.</div>
</div>
<script>
  (async () => { try { await document.fonts.ready; } catch (e) {} setTimeout(() => { window.__ready = true; }, 250); })();
</script>
</body>
</html>
