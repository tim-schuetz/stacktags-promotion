<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Why you can't order "two beers" in China</title>
<link rel="icon" href="data:," />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@500;700;900&display=swap" rel="stylesheet">

<!-- shared design system: tokens + grid + subtitles -->
<link rel="stylesheet" href="elements/theme.css">
<!-- dynamic depth-grid look (the camera grid styling reused by app.js) -->
<link rel="stylesheet" href="elements/depth-transitions.css">
<!-- this video's own scene styling -->
<link rel="stylesheet" href="styles.css?v=1">
</head>
<body>
<div class="wrap">
  <div class="stage stk-grid-bg" id="stage">

    <!-- persistent dynamic grid: the camera (zoom/pan) lives here -->
    <div class="stk-depth2-grid" id="grid"></div>

    <div class="scenes" id="scenes">

      <!-- ============================================================
           HERO EQUATION — "the counting gap":  [ num ] [ slot ] [ 啤酒 ]
           ONE persistent equation carries hook → rule → 二/两 → shortcut →
           punchline. Phases just re-pose its parts and fill/empty the slot.
           ============================================================ -->
      <div class="scene" id="sc-eq">
        <div class="eq-inner" id="eq-inner">

          <!-- contextual broken-attempt stack (no "two beer / three dog / five book") -->
          <div class="attempts" id="attempts">
            <div class="att" data-i="0"><span class="att-n">2</span><span class="att-slot"></span><span class="att-thing" data-thing="beer"></span></div>
            <div class="att" data-i="1"><span class="att-n">3</span><span class="att-slot"></span><span class="att-thing" data-thing="dog"></span></div>
            <div class="att" data-i="2"><span class="att-n">5</span><span class="att-slot"></span><span class="att-thing" data-thing="book"></span></div>
          </div>

          <!-- the equation row -->
          <div class="eq-row" id="eq-row">

            <!-- number tile (2 → 两 ; can show 二 in the "trickier" beat) -->
            <div class="tile num" id="tile-num">
              <div class="num-face" id="num-face">2</div>
              <div class="num-py" id="num-py"></div>
            </div>

            <!-- the measure-word SLOT — the hero. empty = dashed pulsing socket. -->
            <div class="slot empty" id="slot">
              <div class="slot-q" id="slot-q">?</div>
              <div class="slot-mw" id="slot-mw"><span class="mw-zh cjk"></span><span class="mw-py"></span></div>
            </div>

            <!-- the noun: two real beer bottles (the "thing"); swaps for 狗/书/人 -->
            <div class="tile noun" id="tile-noun">
              <div class="noun-swap" id="noun-swap">
                <div class="beers">
                  <img src="assets/photos/beer_dash.png" alt="">
                  <img src="assets/photos/beer_dash.png" alt="">
                </div>
              </div>
              <div class="noun-label" id="noun-label"><span class="nl-zh cjk">啤酒</span><span class="nl-py">píjiǔ · beer</span></div>
            </div>

          </div><!-- /eq-row -->

          <!-- label that names the gap -->
          <div class="eq-label" id="eq-label">
            <span class="el-zh cjk">量词</span>
            <span class="el-en">measure word · classifier</span>
          </div>

          <!-- vocab chip for the dropped measure word (瓶) -->
          <div class="vocab" id="vocab-ping">
            <div class="zh cjk">瓶</div>
            <div class="py">píng</div>
            <div class="en">bottle (measure word)</div>
          </div>

          <!-- "≈94%" stamp for the shortcut (the one memorable stat) -->
          <div class="stamp94" id="stamp94"><b>≈94%</b></div>

          <!-- wordless grammar-exam badge for the punchline (a graded test) -->
          <div class="exam" id="exam"><div class="exam-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1"/><path d="M8.4 12.6l2.4 2.4 4.6-5.2"/></svg></div></div>

        </div>
      </div>

      <!-- ============================================================
           THE WALL — the single slot multiplies into 150+ measure words,
           each paired with the KIND of thing it counts. (zoom-out beat)
           ============================================================ -->
      <div class="scene" id="sc-wall">
        <div class="wall-inner" id="wall-inner">
          <div class="wall-count" id="wall-count"><b id="wall-num">0</b><span>measure words</span></div>
          <div class="wall-grid" id="wall-grid"><!-- tiles injected by app.js --></div>
        </div>
      </div>

      <!-- ============================================================
           OUTRO endcard
           ============================================================ -->
      <div class="scene" id="sc-outro">
        <div class="ec" id="outro-ec">
          <div id="outro-logo"></div>
          <div class="wm"><span class="s">stack</span><span class="t">tags</span></div>
          <div class="url">stacktags.io</div>
        </div>
      </div>

    </div><!-- /scenes -->

    <!-- subtitles mirror the narration (grey; key words turquoise) -->
    <div class="stk-subs" id="subs"><span class="stk-subs-line" id="subs-line"></span></div>

  </div><!-- /stage -->
</div>

<!-- HUD (hidden in clean/capture mode) -->
<div id="hud">
  <button id="btn-play">▶ Play</button>
  <input id="seek" type="range" min="0" max="90" step="0.01" value="0" />
  <span id="tcode">0.0</span>
</div>

<audio id="vo" src="../script_voice.mp3" preload="auto"></audio>

<!-- elements -->
<script src="elements/outro.js"></script>

<!-- this video's choreography -->
<script src="app.js?v=1"></script>
</body>
</html>
