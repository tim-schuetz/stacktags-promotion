<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>thumbnail — Why China has a baby boom every 12 years</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+SC:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../video/elements/theme.css">
<link rel="stylesheet" href="../video/elements/zodiac-wheel.css">
<style>
  html, body { margin: 0; height: 100%; background: #20262b; }
  .wrap { display: grid; place-items: center; height: 100%; }
  .thumb { position: relative; width: 1280px; height: 720px; overflow: hidden; background: #fff;
    background-image:
      linear-gradient(to right,  rgba(35,43,51,.06) 3px, transparent 3px),
      linear-gradient(to bottom, rgba(35,43,51,.06) 3px, transparent 3px);
    background-size: 96px 96px; background-position: center; font-family: 'Inter', sans-serif; }

  /* faint turquoise glow behind the headline */
  .bg-glow { position: absolute; left: -160px; top: -150px; width: 620px; height: 620px; border-radius: 50%;
    background: radial-gradient(circle, rgba(53,162,146,.14) 0%, rgba(53,162,146,0) 68%); }

  /* emphasis token override → house türkis */
  :root { --stk-teal-d: #16A892; }

  /* headline (left) */
  .hl-wrap { position: absolute; left: 82px; top: 168px; width: 660px; }
  .hl { margin: 0; font-weight: 900; font-size: 86px; line-height: 1.0; letter-spacing: -3px; color: var(--stk-ink); }
  .hl.two { margin-top: 6px; }
  .hl .teal { color: var(--stk-teal-d); }
  .sub { margin-top: 40px; font-weight: 700; font-size: 35px; color: var(--stk-ink-2); letter-spacing: -.3px; line-height: 1.2; width: 600px; }
  .sub b { color: var(--stk-teal-d); }

  /* right-side prop: the zodiac wheel, dragon lit, a baby in the centre */
  .prop { position: absolute; right: 56px; top: 50%; transform: translateY(-50%);
    width: 470px; height: 470px; background: #fff; border-radius: 50%;
    box-shadow: 0 40px 80px rgba(20,40,33,.16), 0 6px 20px rgba(20,40,33,.07);
    display: grid; place-items: center; }
  #thumb-wheel { position: relative; width: 430px; height: 430px; }
  .hub-baby { width: 104px; height: 104px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="thumb stk-grid-bg" id="thumb">
    <div class="bg-glow"></div>

    <div class="hl-wrap">
      <h1 class="hl">Every 12 years,</h1>
      <h1 class="hl two"><span class="teal">a baby boom.</span></h1>
      <div class="sub">China times births for the <b>Year of the Dragon</b>.</div>
    </div>

    <div class="prop">
      <div id="thumb-wheel"></div>
    </div>

  </div>
</div>
<script src="../video/elements/zodiac-wheel.js"></script>
<script>
  const baby = `<svg class="hub-baby" viewBox="0 0 48 48" fill="none">
    <path d="M24 45c-9 0-15-6-15-14 0-3 2-5 5-5h20c3 0 5 2 5 5 0 8-6 14-15 14z" fill="#16A892"/>
    <circle cx="24" cy="16" r="11.5" fill="#16A892"/>
    <path d="M24 4.5c2.4 1 3.4 3.2 2.2 5.4" stroke="#fff" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    <circle cx="20" cy="16" r="1.7" fill="#fff"/><circle cx="28" cy="16" r="1.7" fill="#fff"/>
    <path d="M20.5 21q3.5 2.4 7 0" stroke="#fff" stroke-width="2.1" fill="none" stroke-linecap="round"/></svg>`;
  const w = window.mountZodiacWheel('#thumb-wheel', { R: 168, glyph: 60 });
  w.showAllGlyphs();
  w.spin(-120, { instant: true });   // dragon to the top
  w.gray(true);
  w.dragonGlow(true);
  w.hub(baby, true);
  window.__ready = true;
</script>
</body>
</html>
