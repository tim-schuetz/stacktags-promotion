<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>thumbnail — China is forgetting how to write (Quer)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700;900&text=%E6%8F%90%E7%AC%94%E5%BF%98%E5%AD%97&display=swap" rel="stylesheet">
<style>
  :root{ --teal:#35A292; --teal-d:#119271; --turq:#16A892; --ink:#232B33; --muted:#7c8893; }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#1b1f23;}
  #thumb{position:relative;width:1280px;height:720px;overflow:hidden;background:#dfe5e9;
    font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  /* realistic whiteboard photo */
  .board{position:absolute;inset:0;z-index:0;
    background:url('../video/assets/img/wb_land_1.png') center/cover no-repeat;}

  /* the idiom, turquoise marker on the board (a bit smaller, left of the student) */
  .cjk{position:absolute;top:120px;left:158px;z-index:3;white-space:nowrap;
    font-family:'Noto Sans SC',sans-serif;font-weight:900;font-size:170px;line-height:1;
    color:var(--turq);letter-spacing:6px;
    text-shadow:0 2px 0 rgba(22,168,146,.12);}
  /* teal marker underline */
  .ul{position:absolute;top:352px;left:168px;z-index:3;transform:rotate(-.6deg);
    width:684px;height:15px;border-radius:9px;
    background:linear-gradient(90deg,rgba(22,168,146,0),rgba(22,168,146,.85) 10%,rgba(22,168,146,.9) 90%,rgba(22,168,146,0));}
  .sub{position:absolute;top:388px;left:170px;z-index:3;white-space:nowrap;
    font-weight:800;font-size:44px;letter-spacing:9px;color:var(--muted);text-transform:uppercase;}

  /* the graduation student, scratching his head, in front of the board (lower-right) */
  .student{position:absolute;right:18px;bottom:-46px;height:792px;width:auto;z-index:4;
    filter:drop-shadow(0 16px 26px rgba(20,40,33,.22));}
</style>
</head>
<body>
<div id="thumb">
  <div class="board"></div>
  <div class="cjk">提笔忘字</div>
  <div class="ul"></div>
  <div class="sub">character amnesia</div>
  <img class="student" src="../video/assets/img/grad_cut.png" alt="">
</div>
<script>
  (async () => { try { await document.fonts.ready; } catch (e) {} setTimeout(() => { window.__ready = true; }, 250); })();
</script>
</body>
</html>
