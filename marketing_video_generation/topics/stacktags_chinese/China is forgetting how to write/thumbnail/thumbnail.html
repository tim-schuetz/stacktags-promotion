<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>thumbnail — China is forgetting how to write (Quer)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700;900&text=%E6%8F%90%E7%AC%94%E5%BF%98%E5%AD%97&display=swap" rel="stylesheet">
<style>
  :root{ --teal:#35A292; --teal-d:#119271; --turq:#16A892; --ink:#232B33; --muted:#8a949d; }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#1b1f23;}
  #thumb{position:relative;width:1280px;height:720px;overflow:hidden;
    font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;
    background:#fbfdfc;}
  /* whiteboard surface + faint eraser ghosting */
  .board{position:absolute;inset:0;background:
      radial-gradient(120% 80% at 30% 20%, rgba(53,162,146,.05), transparent 60%),
      linear-gradient(115deg, rgba(35,43,51,.035) 0%, transparent 22%),
      linear-gradient(-100deg, rgba(35,43,51,.03) 0%, transparent 30%),
      #ffffff;}
  /* aluminium frame */
  .board::before{content:'';position:absolute;inset:0;
    border:22px solid #d3dadf;border-radius:10px;
    box-shadow:inset 0 0 0 3px #bcc5cc, inset 0 0 34px rgba(35,43,51,.05), 0 0 0 0 #fff;}
  /* marker tray */
  .tray{position:absolute;left:90px;right:90px;bottom:14px;height:26px;border-radius:0 0 8px 8px;
    background:linear-gradient(#c4ccd2,#aab4bc);box-shadow:0 8px 16px rgba(35,43,51,.18);z-index:2;}
  .tray .pen{position:absolute;top:8px;height:14px;border-radius:8px;}
  .tray .pen.a{left:140px;width:160px;background:#119271;}
  .tray .pen.b{left:320px;width:120px;background:#e0654b;}

  .cjk{position:absolute;top:96px;left:0;right:0;text-align:center;z-index:3;
    font-family:'Noto Sans SC',sans-serif;font-weight:900;font-size:236px;line-height:1;
    color:var(--turq);letter-spacing:8px;}
  /* teal marker underline */
  .ul{position:absolute;top:372px;left:50%;transform:translateX(-50%) rotate(-.6deg);z-index:3;
    width:880px;height:16px;border-radius:10px;
    background:linear-gradient(90deg,rgba(17,146,113,0),rgba(17,146,113,.85) 12%,rgba(17,146,113,.9) 88%,rgba(17,146,113,0));}
  .sub{position:absolute;top:408px;left:0;right:430px;text-align:center;z-index:3;white-space:nowrap;
    font-weight:800;font-size:50px;letter-spacing:8px;color:var(--muted);text-transform:uppercase;}

  /* the student, rising from the bottom — head + torso only, gesturing up at the board */
  .student{position:absolute;right:54px;top:392px;height:1020px;width:auto;z-index:4;
    filter:drop-shadow(0 18px 26px rgba(20,40,33,.18));}
</style>
</head>
<body>
<div id="thumb">
  <div class="board"></div>
  <div class="cjk">提笔忘字</div>
  <div class="ul"></div>
  <div class="sub">character amnesia</div>
  <img class="student" src="../video/assets/img/student_cut.png" alt="">
  <div class="tray"><span class="pen a"></span><span class="pen b"></span></div>
</div>
<script>
  (async () => { try { await document.fonts.ready; } catch (e) {} setTimeout(() => { window.__ready = true; }, 200); })();
</script>
</body>
</html>
