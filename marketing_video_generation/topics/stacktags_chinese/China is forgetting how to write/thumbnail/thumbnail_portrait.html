<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>thumbnail — China is forgetting how to write (Hochkant)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700;900&text=%E6%8F%90%E7%AC%94%E5%BF%98%E5%AD%97&display=swap" rel="stylesheet">
<style>
  :root{ --teal:#35A292; --teal-d:#119271; --turq:#16A892; --ink:#232B33; --muted:#7c8893; }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#1b1f23;}
  #thumb{position:relative;width:1080px;height:1920px;overflow:hidden;background:#dfe5e9;
    font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  /* realistic whiteboard photo (zoom in a touch to drop the ceiling, enlarge the board) */
  .board{position:absolute;inset:0;z-index:0;
    background:url('../video/assets/img/wb_port_1.png') center 42%/118% no-repeat;}

  /* the idiom, big 2x2 grid, turquoise marker on the board (a bit smaller than before) */
  .cjk{position:absolute;top:300px;left:96px;right:96px;z-index:3;
    display:grid;grid-template-columns:1fr 1fr;justify-items:center;align-items:center;
    row-gap:6px;column-gap:26px;
    font-family:'Noto Sans SC',sans-serif;font-weight:900;font-size:336px;line-height:.92;
    color:var(--turq);text-shadow:0 3px 0 rgba(22,168,146,.12);}
  /* teal marker underline */
  .ul{position:absolute;top:1030px;left:50%;transform:translateX(-50%) rotate(-.5deg);z-index:3;
    width:760px;height:16px;border-radius:10px;
    background:linear-gradient(90deg,rgba(22,168,146,0),rgba(22,168,146,.85) 10%,rgba(22,168,146,.9) 90%,rgba(22,168,146,0));}
  .sub{position:absolute;top:1074px;left:0;right:0;text-align:center;z-index:3;white-space:nowrap;
    font-weight:800;font-size:52px;letter-spacing:9px;color:var(--muted);text-transform:uppercase;}

  /* graduation student, scratching his head, in front of the board (bottom-right) */
  .student{position:absolute;right:8px;bottom:-360px;height:1140px;width:auto;z-index:4;
    filter:drop-shadow(0 16px 28px rgba(20,40,33,.24));}
</style>
</head>
<body>
<div id="thumb">
  <div class="board"></div>
  <div class="cjk"><span>提</span><span>笔</span><span>忘</span><span>字</span></div>
  <div class="ul"></div>
  <div class="sub">character amnesia</div>
  <img class="student" src="../video/assets/img/grad_cut.png" alt="">
</div>
<script>
  (async () => { try { await document.fonts.ready; } catch (e) {} setTimeout(() => { window.__ready = true; }, 250); })();
</script>
</body>
</html>
