<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>thumbnail — China is forgetting how to write (Hochkant)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700;900&text=%E6%8F%90%E7%AC%94%E5%BF%98%E5%AD%97&display=swap" rel="stylesheet">
<style>
  :root{ --teal:#35A292; --teal-d:#119271; --turq:#16A892; --ink:#232B33; --muted:#8a949d; }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#1b1f23;}
  #thumb{position:relative;width:1080px;height:1920px;overflow:hidden;
    font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;
    background:#fbfdfc;}
  /* whiteboard surface + faint eraser ghosting */
  .board{position:absolute;inset:0;background:
      radial-gradient(120% 60% at 30% 14%, rgba(53,162,146,.05), transparent 60%),
      linear-gradient(115deg, rgba(35,43,51,.035) 0%, transparent 22%),
      linear-gradient(-100deg, rgba(35,43,51,.03) 0%, transparent 30%),
      #ffffff;}
  /* aluminium frame */
  .board::before{content:'';position:absolute;inset:0;
    border:26px solid #d3dadf;border-radius:12px;
    box-shadow:inset 0 0 0 4px #bcc5cc, inset 0 0 44px rgba(35,43,51,.05);}
  /* marker tray */
  .tray{position:absolute;left:80px;right:80px;bottom:60px;height:30px;border-radius:0 0 10px 10px;
    background:linear-gradient(#c4ccd2,#aab4bc);box-shadow:0 10px 18px rgba(35,43,51,.18);z-index:2;}
  .tray .pen{position:absolute;top:9px;height:16px;border-radius:9px;}
  .tray .pen.a{left:130px;width:180px;background:#119271;}
  .tray .pen.b{left:336px;width:130px;background:#e0654b;}

  /* the idiom, big 2x2 grid */
  .cjk{position:absolute;top:300px;left:70px;right:70px;z-index:3;
    display:grid;grid-template-columns:1fr 1fr;justify-items:center;align-items:center;
    row-gap:8px;column-gap:30px;
    font-family:'Noto Sans SC',sans-serif;font-weight:900;font-size:420px;line-height:.92;
    color:var(--turq);}
  /* teal marker underline */
  .ul{position:absolute;top:1150px;left:50%;transform:translateX(-50%) rotate(-.5deg);z-index:3;
    width:820px;height:18px;border-radius:11px;
    background:linear-gradient(90deg,rgba(17,146,113,0),rgba(17,146,113,.85) 12%,rgba(17,146,113,.9) 88%,rgba(17,146,113,0));}
  .sub{position:absolute;top:1196px;left:0;right:360px;text-align:center;z-index:3;white-space:nowrap;
    font-weight:800;font-size:60px;letter-spacing:9px;color:var(--muted);text-transform:uppercase;}

  /* the student, rising from the bottom — head + torso only (legs fall off-frame), gesturing up at the board */
  .student{position:absolute;right:4px;bottom:-480px;height:1120px;width:auto;z-index:4;
    filter:drop-shadow(0 18px 28px rgba(20,40,33,.18));}

  /* brand wordmark */
  .brand{position:absolute;left:96px;bottom:96px;z-index:5;}
  .brand .wm{font-weight:900;font-size:84px;letter-spacing:-2px;}
  .brand .wm .s{color:var(--ink);} .brand .wm .t{color:var(--teal);}
</style>
</head>
<body>
<div id="thumb">
  <div class="board"></div>
  <div class="cjk"><span>提</span><span>笔</span><span>忘</span><span>字</span></div>
  <div class="ul"></div>
  <div class="sub">character amnesia</div>
  <img class="student" src="../video/assets/img/student_cut.png" alt="">
  <div class="tray"><span class="pen a"></span><span class="pen b"></span></div>
  <div class="brand"><span class="wm"><span class="s">stack</span><span class="t">tags</span></span></div>
</div>
<script>
  (async () => { try { await document.fonts.ready; } catch (e) {} setTimeout(() => { window.__ready = true; }, 200); })();
</script>
</body>
</html>
