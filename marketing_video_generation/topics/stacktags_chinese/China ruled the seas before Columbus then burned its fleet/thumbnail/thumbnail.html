<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>thumbnail — China ruled the seas (Quer)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1c2630; --ink2:#4a5560; --muted:#8a949d;
    --teal:#35A292; --teal-d:#119271; --turq:#16A892;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#1b1f23;}
  #thumb{position:relative;width:1280px;height:720px;overflow:hidden;
    font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;
    background:#46AC94;}
  .harbor{position:absolute;inset:0;z-index:0;
    background:url('assets/harbor.png') no-repeat;
    background-size:1620px auto;background-position:right -40px;}

  /* diagonal white wedge, top-left */
  svg.cut{position:absolute;left:0;top:0;width:100%;height:100%;z-index:2;overflow:visible;}

  .cap{position:absolute;left:60px;top:66px;z-index:3;
    font-weight:900;line-height:.92;letter-spacing:-0.03em;color:var(--ink);}
  .cap .l1{font-size:94px;}
  .cap .l2{font-size:94px;color:var(--turq);}
  .cap .kick{display:block;font-size:30px;font-weight:800;letter-spacing:7px;
    color:var(--muted);text-transform:uppercase;margin-bottom:14px;letter-spacing:8px;}
</style>
</head>
<body>
<div id="thumb">
  <div class="harbor"></div>

  <svg class="cut" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="ds" x="-20%" y="-20%" width="160%" height="160%">
        <feDropShadow dx="10" dy="12" stdDeviation="14" flood-color="#1c2630" flood-opacity="0.22"/>
      </filter>
    </defs>
    <path d="M0,0 L820,0 L0,580 Z" fill="#ffffff" filter="url(#ds)"></path>
    <path d="M820,0 L0,580" fill="none" stroke="#16A892" stroke-width="9"></path>
  </svg>

  <div class="cap">
    <span class="kick">Zheng He&rsquo;s fleet</span>
    <span class="l1">First in</span><br>
    <span class="l2">Africa</span>
  </div>
</div>
<script>
  (async () => { try { await document.fonts.ready; } catch (e) {} setTimeout(() => { window.__ready = true; }, 200); })();
</script>
</body>
</html>
