<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Why all of China runs on one clock</title>
<link rel="icon" href="data:," />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@500;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="elements/theme.css">
<link rel="stylesheet" href="elements/depth-transitions.css">
<link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
<div class="wrap">
  <div class="stage stk-grid-bg" id="stage">

    <div class="stk-depth2-grid" id="grid"></div>

    <div class="scenes" id="scenes">

      <!-- S1+S2 — China map, time-zone bands + ghost clocks, caliper; one clock grows to centre + 北京时间 -->
      <div class="scene" id="sc-hook">
        <div class="map-stage" id="hook-stage">
          <div class="map-host" id="hook-map"></div>
          <div class="bj-title cjk" id="bj-title">北京时间</div>
        </div>
      </div>

      <!-- S3 — globe dives into the far west, hands off to a dark city of cut-out houses -->
      <div class="scene" id="sc-west">
        <div class="globe-host" id="west-globe"></div>
        <div class="west-city" id="west-city">
          <svg class="wc-moon" viewBox="0 0 100 100"><path d="M52 6 A44 44 0 1 0 52 94 A32 44 0 0 1 52 6 Z"/></svg>
          <div class="wc-houses" id="wc-houses"></div>
        </div>
      </div>

      <!-- S4+S5 — globe zoom-out China→USA, then US (4) vs China (5); then US leaves, the 5 clocks merge -->
      <div class="scene" id="sc-compare">
        <div class="globe-host" id="compare-globe"></div>
        <div class="compare" id="compare-stage">
          <div class="cmp-row" id="cmp-us">
            <div class="cmp-map" id="us-map"></div>
            <div class="cmp-name">United States</div>
          </div>
          <div class="cmp-china-wrap" id="cmp-china-wrap">
            <div class="cmp-map" id="cn-map"></div>
            <div class="cmp-name china" id="cn-name">China</div>
            <div class="year-tick" id="merge-year">1949</div>
          </div>
        </div>
      </div>

      <!-- S6 — globe: a dot at Beijing, a line west to Xinjiang, a dot at Xinjiang -->
      <div class="scene" id="sc-globe6">
        <div class="globe-host" id="route-globe"></div>
      </div>

      <!-- S7 — unofficial local time: greyed Beijing clock + bright local clock + real cut-out objects -->
      <div class="scene" id="sc-local">
        <div class="local" id="local-stage"></div>
      </div>

      <!-- S9+S10 — calm unified one-clock map, then the sun crests in the west anyway -->
      <div class="scene" id="sc-punch">
        <div class="map-stage" id="punch-stage">
          <div class="map-host" id="punch-map"></div>
          <div class="punch-layer" id="punch-layer"></div>
        </div>
      </div>

      <!-- S11 — outro endcard -->
      <div class="scene" id="sc-outro">
        <div class="ec" id="outro-ec">
          <div id="outro-logo"></div>
          <div class="wm"><span class="s">stack</span><span class="t">tags</span></div>
          <div class="url">stacktags.io</div>
        </div>
      </div>

    </div><!-- /scenes -->

    <div class="stk-subs" id="subs"><span class="stk-subs-line" id="subs-line"></span></div>

  </div><!-- /stage -->
</div>

<div id="hud">
  <button id="btn-play">▶ Play</button>
  <input id="seek" type="range" min="0" max="72" step="0.01" value="0" />
  <span id="tcode">0.0</span>
</div>

<audio id="vo" src="../script_voice.mp3" preload="auto"></audio>

<!-- libs: flat country maps + 3D globe -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/earcut@2.2.4/dist/earcut.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>

<script src="elements/country-map.js"></script>
<script src="elements/clock-kit.js"></script>
<script src="elements/globe.js"></script>
<script src="elements/outro.js"></script>

<script src="app.js?v=2"></script>
</body>
</html>
