<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Stacktags — How a bureaucrats' dialect conquered China</title>
<link rel="icon" href="data:," />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Inter only (design guide); CJK uses a SANS face, never serif -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Nunito:wght@700;800;900&family=Noto+Sans+SC:wght@500;700;900&display=swap" rel="stylesheet">
<!-- shared theme FIRST (tokens, grid, subtitle styles), then elements, then this video -->
<link rel="stylesheet" href="elements/theme.css" />
<link rel="stylesheet" href="elements/depth.css" />
<link rel="stylesheet" href="elements/timeline.css" />
<link rel="stylesheet" href="styles.css?v=6" />
</head>
<body>
<div class="root">
  <div class="stage stk-grid-bg" id="stage">

    <!-- sync flash: a single black frame burned in at audio t=0 so the build can
         find the exact trim point in the recording (blackdetect), independent of
         how long the headless page took to start. Trimmed back out in the mux. -->
    <div id="syncflash"></div>

    <!-- top progress bar -->
    <div class="vprogress"><div class="vprogress-fill" id="vprogress"></div></div>

    <!-- brand watermark (corner) -->
    <div class="brand-wm"><span class="wm-stack">stack</span><span class="wm-tags">tags</span></div>

    <!-- ============ SCENE: GLOBE HOOK (globe → MANDARIN crossed out) ============ -->
    <section class="scene scene-globe" id="scene-globe">
      <div class="globe-host" id="globe-host"></div>
      <div class="hook-word" id="hook-word">
        <div class="hook-word-main">Mandarin<span class="hook-slash" id="hook-slash"></span><span class="hook-slash hook-slash2"></span></div>
      </div>
    </section>

    <!-- ============ SCENE: TIMELINE (rocket back past Rome into the dynasties) ============ -->
    <section class="scene scene-timeline" id="scene-timeline">
      <div class="tl-host" id="tl-host"></div>
    </section>

    <!-- ============ SCENE: WARRING STATES → 汉 takeover (honeycomb) ============ -->
    <section class="scene scene-states" id="scene-states">
      <div class="states-host" id="states-host"></div>
    </section>

    <!-- ============ SCENE: DEPTH-TRANSITION SPINE (the moving-grid fly-through) ============ -->
    <section class="scene scene-depth" id="scene-depth">
      <div class="depth-host" id="depth-host"></div>
    </section>

    <!-- ============ SCENE: PORTUGUESE SHIP → CHINA (cut-out ship sails over a globe) ============ -->
    <section class="scene scene-ship" id="scene-ship">
      <div class="ship-host" id="ship-host"></div>
    </section>

    <!-- ============ SCENE: OUTRO (default endcard element) ============ -->
    <section class="scene scene-outro" id="scene-outro">
      <div class="ec">
        <div class="ec-logo" id="outro-logo"></div>
        <div class="ec-wm"><span class="s">stack</span><span class="t">tags</span></div>
        <div class="ec-url">stacktags.io</div>
      </div>
    </section>

    <!-- subtitles: mirror exactly what is being said, one line at a time -->
    <div class="stk-subs"><div class="stk-subs-line" id="sub"></div></div>

  </div>

  <audio id="vo" src="../script_audio.mp3" preload="auto"></audio>

  <!-- control bar (hidden in clean mode with "C") -->
  <div class="hud" id="hud">
    <button id="play">▶ Play</button>
    <button id="restart">↺ Restart</button>
    <span class="info" id="info">0.0s</span>
    <button id="cleanbtn">Clean (C)</button>
  </div>
</div>

<!-- globe deps -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/earcut@2.2.4/dist/earcut.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
<!-- default elements -->
<script src="elements/globe.js"></script>
<script src="elements/timeline.js"></script>
<script src="elements/depth.js"></script>
<script src="elements/illus.js"></script>
<script src="elements/states.js"></script>
<script src="elements/ship.js"></script>
<script src="elements/outro.js"></script>
<script src="app.js?v=6"></script>
</body>
</html>
