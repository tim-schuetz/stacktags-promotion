<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Why Japan stole China's writing</title>
<link rel="icon" href="data:," />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Nunito:wght@700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Sans+SC:wght@500;700;900&display=swap" rel="stylesheet">

<!-- shared theme tokens + grid + subtitles (the design system) -->
<link rel="stylesheet" href="elements/theme.css">
<!-- the dynamic depth-grid look (we reuse its grid styling) -->
<link rel="stylesheet" href="elements/depth-transitions.css">
<!-- default elements used as components -->
<link rel="stylesheet" href="elements/figure.css">
<link rel="stylesheet" href="elements/text-popup.css">
<!-- this video's own scene styling -->
<link rel="stylesheet" href="styles.css?v=1">
</head>
<body>
<div class="wrap">
  <div class="stage stk-grid-bg" id="stage">

    <!-- persistent dynamic grid: the camera (zoom/pan) lives here -->
    <div class="stk-depth2-grid" id="grid"></div>

    <!-- all scene layers stack here -->
    <div class="scenes" id="scenes">

      <!-- HOOK: a real JP sentence → splits into its 3 scripts → "Japan invented" -->
      <div class="scene" id="sc-hook"></div>

      <!-- MISFIT: a kanji wedged in the wrong-shaped slot, duct-taped (reused at the resolve) -->
      <div class="scene" id="sc-misfit"></div>

      <!-- ~1,500 yrs ago: figure talks beside a blank scroll → the scroll fills with characters -->
      <div class="scene" id="sc-scroll"></div>

      <!-- IMPORT: 2D East-Asia map, characters sail a dashed route China → Japan -->
      <div class="scene" id="sc-import"></div>

      <!-- UNRELATED: two figures read the SAME character 字 in garbled, different ways (figure element) -->
      <div class="scene" id="sc-unrelated"></div>

      <!-- ENGLISH: writing English with only kanji → a piece that won't fit -->
      <div class="scene" id="sc-english"></div>

      <!-- FIX 1a: one character, two jobs (meaning vs sound) -->
      <div class="scene" id="sc-twojobs"></div>

      <!-- FIX 1b: one character, two readings (on'yomi / kun'yomi) -->
      <div class="scene" id="sc-readings"></div>

      <!-- FIX 1c: 生 explodes into many readings -->
      <div class="scene" id="sc-explode"></div>

      <!-- FIX 2: kanji → kana morphs (hiragana + katakana) -->
      <div class="scene" id="sc-kana"></div>

      <!-- MIX: the hook sentence reassembles, now woven from all three scripts -->
      <div class="scene" id="sc-mix"></div>

      <!-- RESOLVE: the misfit kanji + kana snap into one clean whole -->
      <div class="scene" id="sc-resolve"></div>

      <!-- BEAUTY: elegant final arrangement + the once-blank scroll, now full -->
      <div class="scene" id="sc-beauty"></div>

      <!-- OUTRO -->
      <div class="scene" id="sc-outro">
        <div class="ec" id="outro-ec">
          <div id="outro-logo"></div>
          <div class="wm"><span class="s">stack</span><span class="t">tags</span></div>
          <div class="url">stacktags.io</div>
        </div>
      </div>

    </div><!-- /scenes -->

    <!-- subtitles mirror the narration -->
    <div class="stk-subs" id="subs"><span class="stk-subs-line" id="subs-line"></span></div>

  </div><!-- /stage -->
</div>

<!-- HUD (hidden in clean/capture mode) -->
<div id="hud">
  <button id="btn-play">▶ Play</button>
  <input id="seek" type="range" min="0" max="94.6" step="0.01" value="0" />
  <span id="tcode">0.0</span>
</div>

<audio id="vo" src="../script_voice.mp3" preload="auto"></audio>

<!-- default elements (used as components) -->
<script src="elements/text-popup.js"></script>
<script src="elements/outro.js"></script>

<!-- this video's choreography -->
<script src="app.js?v=1"></script>
</body>
</html>
