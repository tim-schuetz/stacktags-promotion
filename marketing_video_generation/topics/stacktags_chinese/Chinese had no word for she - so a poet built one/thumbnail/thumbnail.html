<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>thumbnail — Chinese had no word for she (Quer)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@700;900&text=%E5%A5%B9&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#232B33; --ink2:#4a5560; --muted:#8a949d;
    --teal:#35A292; --teal-d:#16A892; --turq:#16A892; --teal-soft:#e7f4ef;
    --grid:rgba(35,43,51,0.06);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:#1b1f23;}
  #thumb{position:relative;width:1280px;height:720px;overflow:hidden;background:#fff;
    font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  #thumb::before{content:'';position:absolute;inset:0;z-index:0;
    background-image:
      linear-gradient(to right, var(--grid) 3px, transparent 3px),
      linear-gradient(to bottom, var(--grid) 3px, transparent 3px);
    background-size:120px 120px;background-position:center center;}
  .blob{position:absolute;border-radius:50%;filter:blur(85px);opacity:.5;z-index:0;}
  .blob.a{width:560px;height:560px;left:-180px;top:-160px;background:#cdeae1;}
  .blob.b{width:600px;height:600px;right:-220px;bottom:-180px;background:#d7efe8;}

  /* the woman, right, looking left toward her word */
  .woman{position:absolute;right:26px;bottom:-24px;height:780px;width:auto;z-index:3;
    filter:drop-shadow(0 22px 30px rgba(20,40,33,.20));}

  /* left block: kicker + hero character + gloss */
  .left{position:absolute;left:96px;top:0;bottom:0;width:700px;z-index:4;
    display:flex;flex-direction:column;justify-content:center;}
  .kicker{font-weight:800;font-size:32px;letter-spacing:6px;color:var(--muted);text-transform:uppercase;
    margin-bottom:26px;}
  .kicker b{color:var(--ink2);}
  .hero{font-family:'Noto Sans SC',sans-serif;font-weight:900;font-size:400px;line-height:.84;
    color:var(--turq);margin-left:-10px;
    text-shadow:0 26px 50px rgba(17,146,113,.22);}
  .gloss{display:flex;align-items:baseline;gap:20px;margin-top:6px;}
  .gloss .py{font-weight:800;font-size:56px;color:var(--ink);letter-spacing:-0.01em;}
  .gloss .en{font-weight:800;font-size:46px;color:var(--ink2);}
  .gloss .en b{color:var(--teal-d);}
</style>
</head>
<body>
<div id="thumb">
  <div class="blob a"></div><div class="blob b"></div>

  <img class="woman" src="../video/assets/img/woman_cut.png" alt="">

  <div class="left">
    <div class="kicker">A poet <b>invented</b> it &middot; 1920</div>
    <div class="hero">她</div>
    <div class="gloss">
      <span class="py">t&#257;</span>
      <span class="en">= the word for <b>&ldquo;she.&rdquo;</b></span>
    </div>
  </div>
</div>
<script>
  (async () => { try { await document.fonts.ready; } catch (e) {} setTimeout(() => { window.__ready = true; }, 200); })();
</script>
</body>
</html>
