<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>thumbnail — Chinese had no word for "she"</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;700;900&text=她&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#232B33; --ink2:#4a5560; --muted:#8a949d;
    --teal:#35A292; --teal-d:#119271; --teal-soft:#e7f4ef;
    --grid:rgba(35,43,51,0.06);
  }
  html,body{margin:0;padding:0;height:100%;background:#1b1f23;}
  #thumb{position:relative;width:1280px;height:720px;overflow:hidden;background:#fff;
    font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  #thumb::before{content:'';position:absolute;inset:0;
    background-image:
      linear-gradient(to right, var(--grid) 3px, transparent 3px),
      linear-gradient(to bottom, var(--grid) 3px, transparent 3px);
    background-size:120px 120px;background-position:center center;}
  /* left headline block */
  .left{position:absolute;left:84px;top:0;bottom:0;width:660px;display:flex;flex-direction:column;justify-content:center;z-index:3;}
  .kicker{font-weight:800;font-size:33px;letter-spacing:6px;color:var(--muted);text-transform:uppercase;margin-bottom:24px;}
  .hl{font-weight:900;letter-spacing:-0.04em;line-height:0.96;margin:0;color:var(--ink);font-size:108px;}
  .hl .teal{color:var(--teal-d);}
  .sub{margin-top:30px;font-weight:800;font-size:37px;color:var(--ink2);letter-spacing:-0.01em;}
  .sub .teal{color:var(--teal-d);}
  /* right: the woman who finally got her word (她) */
  .right{position:absolute;right:0;top:0;bottom:0;width:540px;}
  .woman{position:absolute;right:36px;bottom:-20px;height:700px;
    background:url('../video/assets/img/woman_dashed.png') center bottom/contain no-repeat;width:380px;}
  .cell{position:absolute;left:18px;top:210px;width:226px;height:226px;border-radius:24px;background:#fff;
    box-shadow:0 30px 60px rgba(20,40,33,.20), inset 0 0 0 2px rgba(53,162,146,.16);
    display:flex;align-items:center;justify-content:center;z-index:4;}
  .cell::before,.cell::after{content:'';position:absolute;}
  .cell::before{left:50%;top:9%;bottom:9%;width:2px;transform:translateX(-50%);
    background:repeating-linear-gradient(to bottom, rgba(35,43,51,.15) 0 10px, transparent 10px 19px);}
  .cell::after{top:50%;left:9%;right:9%;height:2px;transform:translateY(-50%);
    background:repeating-linear-gradient(to right, rgba(35,43,51,.15) 0 10px, transparent 10px 19px);}
  .cell .zh{font-family:'Noto Sans SC',sans-serif;font-weight:900;font-size:166px;line-height:1;color:var(--teal-d);}
  .cell .yr{position:absolute;right:-8px;bottom:-26px;font-weight:900;font-size:34px;color:var(--teal-d);
    background:#fff;padding:2px 14px;border-radius:12px;box-shadow:0 10px 22px rgba(20,40,33,.14);}
</style>
</head>
<body>
<div id="thumb">
  <div class="left">
    <div class="kicker">Chinese, until ~1920</div>
    <h1 class="hl">No word<br>for <span class="teal">“she.”</span></h1>
    <div class="sub">So a poet <span class="teal">built her one.</span></div>
  </div>
  <div class="right">
    <div class="woman"></div>
    <div class="cell"><span class="zh">她</span><span class="yr">1920</span></div>
  </div>
</div>
<script>
  (async () => { try { await document.fonts.ready; } catch (e) {} setTimeout(() => { window.__ready = true; }, 250); })();
</script>
</body>
</html>
