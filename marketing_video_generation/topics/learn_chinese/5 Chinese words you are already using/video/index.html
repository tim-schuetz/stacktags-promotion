<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Stacktags — 5 Chinese words you are already using</title>
<link rel="icon" href="data:," />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Nunito:wght@700;800;900&family=Noto+Sans+SC:wght@500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="elements/theme.css" />
<link rel="stylesheet" href="elements/depth.css" />
<link rel="stylesheet" href="elements/enum-detail.css" />
<link rel="stylesheet" href="styles.css?v=9" />
</head>
<body>
<div class="root">
  <div class="stage" id="stage">

    <!-- top progress bar -->
    <div class="vprogress"><div class="vprogress-fill" id="vprogress"></div></div>

    <!-- main depth fly-through (draws its own moving grid) -->
    <div class="layer depth-layer" id="depth-host"></div>

    <!-- enumeration → stacked-logo (its own grid; persists as a corner badge) -->
    <div class="layer enum-layer" id="enum-host"></div>

    <!-- closing brand card (StacktagsOutro element) -->
    <div class="layer outro-layer" id="outro-host"></div>

    <!-- running vocab tally (introduced hanzi accumulate, top-left beside the stack) -->
    <div class="vocab-tally" id="vocab-tally"></div>

    <!-- subtitles that mirror the narration -->
    <div class="stk-subs" id="subs"><span class="stk-subs-line" id="subline"></span></div>

  </div>

  <audio id="vo" src="../script_audio.mp3" preload="auto"></audio>

  <!-- control bar (hidden in clean mode with "C") -->
  <div class="hud" id="hud">
    <button id="play">▶ Play</button>
    <button id="restart">↺ Restart</button>
    <span class="info" id="info">0.0s</span>
    <button id="cleanbtn">Clean (C)</button>
  </div>
</div>

<script src="elements/depth.js"></script>
<script src="elements/enum-detail.js"></script>
<script src="elements/outro.js"></script>
<script src="app.js?v=9"></script>
</body>
</html>
