<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>How to launder $1.5 billion in crypto</title>
<link rel="icon" href="data:," />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Nunito:wght@700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<!-- shared theme tokens + grid + subtitles (the design system) -->
<link rel="stylesheet" href="elements/theme.css">
<!-- the dynamic depth-grid look (we reuse its grid styling) -->
<link rel="stylesheet" href="elements/depth-transitions.css">
<!-- default elements used as components -->
<link rel="stylesheet" href="elements/enumeration_with_in_detail_follow_up.css">
<!-- this video's own scene styling -->
<link rel="stylesheet" href="styles.css?v=1">
</head>
<body>
<div class="wrap">
  <div class="stage stk-grid-bg" id="stage">

    <!-- persistent dynamic grid: the camera (zoom/pan) lives here -->
    <div class="stk-depth2-grid" id="grid"></div>

    <!-- all scene layers stack here -->
    <div class="scenes" id="scenes">

      <!-- ===== HOOK 1 — recreated Bybit-hack news headlines ===== -->
      <div class="scene" id="sc-news"></div>

      <!-- ===== HOOK 2 — public ledger: stolen wallet, glowing $1.5B ===== -->
      <div class="scene" id="sc-ledger-hook"></div>

      <!-- ===== MYTH 1 — "ANONYMOUS" stamped FALSE -> TRACEABLE ===== -->
      <div class="scene" id="sc-anon">
        <div class="anon-wrap">
          <div class="anon-word" id="anon-word">ANONYMOUS</div>
          <div class="anon-stamp" id="anon-stamp">FALSE</div>
        </div>
      </div>

      <!-- ===== MYTH 2 — the public ledger scrolling forever ===== -->
      <div class="scene" id="sc-ledger-scroll"></div>

      <!-- ===== MYTH 3 — stealing easy / spending hard ===== -->
      <div class="scene" id="sc-easyhard">
        <div class="eh-wrap">
          <div class="eh-chip steal" id="eh-steal">
            <div class="eh-k">STEALING</div><div class="eh-v">easy <span class="eh-mark ok">✓</span></div>
          </div>
          <div class="eh-chip spend" id="eh-spend">
            <div class="eh-k">SPENDING</div><div class="eh-v">hard <span class="eh-lock" id="eh-lock">🔒</span></div>
          </div>
        </div>
      </div>

      <!-- ===== WHY — tagged transfer flagged & frozen at the exchange ===== -->
      <div class="scene" id="sc-frozen">
        <div class="fz-wrap">
          <div class="fz-track"></div>
          <div class="fz-exchange"><div class="fz-ex-glyph">⛁</div><div class="fz-ex-label">EXCHANGE</div></div>
          <div class="fz-coin" id="fz-coin"><div class="fz-coin-disc">$</div><div class="fz-rad">RADIOACTIVE</div></div>
          <div class="fz-flag" id="fz-flag">FLAGGED</div>
          <div class="fz-frost" id="fz-frost"></div>
        </div>
      </div>

      <!-- ===== THE THREE MOVES — enumeration docks; moves play below ===== -->
      <div class="scene" id="sc-enum">
        <div id="enum-host"></div>
        <div class="move move1" id="move1"></div>
        <div class="move move2" id="move2"></div>
        <div class="move move3" id="move3"></div>
      </div>

      <!-- ===== PUNCHLINE — back to the glowing public ledger ===== -->
      <div class="scene" id="sc-punchline"></div>

      <!-- ===== OUTRO ===== -->
      <div class="scene" id="sc-outro">
        <div class="ec" id="outro-ec">
          <div id="outro-logo"></div>
          <div class="wm"><span class="s">stack</span><span class="t">tags</span></div>
          <div class="url">stacktags.io</div>
          <div class="follow" id="outro-follow">Follow <span class="follow-tap">👆</span></div>
        </div>
      </div>

    </div><!-- /scenes -->

    <!-- subtitles mirror the narration -->
    <div class="stk-subs" id="subs"><span class="stk-subs-line" id="subs-line"></span></div>

  </div><!-- /stage -->
</div>

<!-- HUD (hidden in clean/capture mode) -->
<div id="hud">
  <button id="btn-play">▶ Play</button>
  <input id="seek" type="range" min="0" max="84" step="0.01" value="0" />
  <span id="tcode">0.0</span>
</div>

<audio id="vo" src="../script_voice.mp3" preload="auto"></audio>

<!-- default elements (used as components) -->
<script src="elements/enumeration_with_in_detail_follow_up.js"></script>
<script src="elements/outro.js"></script>

<!-- this video's choreography -->
<script src="app.js?v=1"></script>
</body>
</html>
