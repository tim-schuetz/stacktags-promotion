<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
  :root{ --teal:#35A292; --teal-d:#119271; --teal-soft:#e7f4ef; --ink:#141a1e; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ width:1280px; height:720px; overflow:hidden; }
  .tb{
    position:relative; width:1280px; height:720px; background:#f4f7f6;
    font-family:'Nunito','Inter',system-ui,sans-serif; overflow:hidden;
  }
  /* very faint grid, barely there (keeps brand feel without clutter) */
  .tb::before{
    content:''; position:absolute; inset:0;
    background-image:linear-gradient(to right, rgba(35,43,51,.04) 2px, transparent 2px),
                     linear-gradient(to bottom, rgba(35,43,51,.04) 2px, transparent 2px);
    background-size:120px 120px;
  }

  /* rising chart sweep behind the coin (echoes "explosion / growth") */
  .chart{ position:absolute; right:0; bottom:0; width:760px; height:560px; z-index:1; }

  /* headline */
  .head{ position:absolute; left:74px; top:96px; z-index:5; }
  .h-eyebrow{ font-family:'Inter'; font-weight:800; font-size:52px; letter-spacing:-1px; color:var(--ink); line-height:1; }
  .h-big{ font-weight:900; font-size:188px; letter-spacing:-6px; color:var(--teal); line-height:.86; margin:6px 0 2px -6px; }
  .h-sub{ font-weight:900; font-size:96px; letter-spacing:-3px; color:var(--ink); line-height:.96; }
  .h-sub .q{ color:var(--teal); }

  /* hero bitcoin coin */
  .coin-hero{ position:absolute; right:70px; bottom:48px; width:360px; z-index:6;
    filter:drop-shadow(0 30px 36px rgba(16,50,40,.28)); transform:rotate(-7deg); }
  .coin-hero img{ width:100%; height:auto; display:block; }

  /* memecoin faces riding the flood */
  .face{ position:absolute; z-index:6; filter:drop-shadow(0 16px 22px rgba(16,50,40,.22)); }
  .face img{ width:100%; height:auto; display:block; }
  .f-dog{ width:148px; left:560px; bottom:40px; transform:rotate(-12deg); z-index:7; }
  .f-celeb{ width:120px; right:392px; bottom:250px; transform:rotate(10deg); }
  .f-moon{ width:96px; right:60px; top:40px; transform:rotate(-8deg); }

  /* teal coin chips = the flood */
  .chip{ position:absolute; border-radius:50%; background:var(--teal-soft); color:var(--teal-d);
    display:flex; align-items:center; justify-content:center; font-weight:900; z-index:4;
    box-shadow:0 8px 18px rgba(16,50,40,.12); }
  .badge{ position:absolute; left:74px; bottom:48px; z-index:5;
    display:flex; align-items:center; gap:14px; }
  .badge .dot{ width:18px; height:18px; border-radius:50%; background:var(--teal); }
  .badge .txt{ font-family:'Inter'; font-weight:800; font-size:34px; letter-spacing:-.5px; color:#8a949d; }
</style>
</head>
<body>
<div class="tb">
  <svg class="chart" viewBox="0 0 760 560" preserveAspectRatio="none">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#35A292" stop-opacity="0.22"/>
        <stop offset="1" stop-color="#35A292" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path d="M0,520 L120,470 L210,500 L320,360 L420,400 L520,250 L600,300 L700,120 L760,150 L760,560 L0,560 Z" fill="url(#g)"/>
    <path d="M0,520 L120,470 L210,500 L320,360 L420,400 L520,250 L600,300 L700,120 L760,150" fill="none" stroke="#35A292" stroke-width="9" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>

  <div class="head">
    <div class="h-eyebrow">Why are there</div>
    <div class="h-big">MILLIONS</div>
    <div class="h-sub">of crypto coins<span class="q">?</span></div>
  </div>

  <img class="coin-hero" src="../video/assets/img/bitcoin_cut.png" alt="">
  <div class="face f-dog"><img src="../video/assets/img/coin-dog_cut.png" alt=""></div>
  <div class="face f-celeb"><img src="../video/assets/img/coin-celeb_cut.png" alt=""></div>
  <div class="face f-moon"><img src="../video/assets/img/coin-moon_cut.png" alt=""></div>

  <!-- flood chips (kept clear of the headline) -->
  <div class="chip" style="left:560px; top:14px; width:66px; height:66px; font-size:33px;">Ξ</div>
  <div class="chip" style="left:720px; bottom:128px; width:60px; height:60px; font-size:30px;">$</div>
  <div class="chip" style="left:610px; top:332px; width:52px; height:52px; font-size:26px;">◎</div>
  <div class="chip" style="right:300px; bottom:54px; width:64px; height:64px; font-size:32px;">¢</div>
  <div class="chip" style="right:150px; bottom:372px; width:48px; height:48px; font-size:24px;">✦</div>

  <div class="badge"><span class="dot"></span><span class="txt">stacktags</span></div>
</div>
</body>
</html>
