<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Why are there so many crypto coins?</title>
<link rel="icon" href="data:," />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Nunito:wght@700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<!-- shared theme tokens + grid + subtitles (the design system) -->
<link rel="stylesheet" href="elements/theme.css">
<!-- the dynamic depth-grid look (we reuse its grid styling) -->
<link rel="stylesheet" href="elements/depth-transitions.css">
<!-- default element used as a component -->
<link rel="stylesheet" href="elements/text-popup.css">
<!-- this video's own scene styling -->
<link rel="stylesheet" href="styles.css?v=1">
</head>
<body>
<div class="wrap">
  <div class="stage stk-grid-bg" id="stage">

    <!-- persistent dynamic grid: the camera (zoom/pan) lives here -->
    <div class="stk-depth2-grid" id="grid"></div>

    <!-- all scene layers stack here; content is built by app.js -->
    <div class="scenes" id="scenes">
      <div class="scene" id="sc-counter"></div>   <!-- 1 the millions counter + coin flood -->
      <div class="scene" id="sc-slow"></div>       <!-- 2 a single, sluggish bitcoin -->
      <div class="scene" id="sc-rail"></div>       <!-- 3 one rail, one job -->
      <div class="scene" id="sc-build"></div>      <!-- 4 can't build on top -->
      <div class="scene" id="sc-eth"></div>        <!-- 5 ethereum platform + apps -->
      <div class="scene" id="sc-code"></div>       <!-- 6 code -> token -->
      <div class="scene" id="sc-flood"></div>      <!-- 7 floodgates: tokens multiply -->
      <div class="scene" id="sc-congest"></div>    <!-- 8 congested + rising gas fee -->
      <div class="scene" id="sc-rivals"></div>     <!-- 9 rival chains, each its own coin -->
      <div class="scene" id="sc-launch"></div>     <!-- 10 pump.fun-style launch UI -->
      <div class="scene" id="sc-meme"></div>       <!-- 11 memecoin flood + faces -->
      <div class="scene" id="sc-tree"></div>       <!-- 12 the tree of fixes -->
      <div class="scene" id="sc-button"></div>     <!-- 13 one experiment -> a button -->

      <!-- ===== OUTRO ===== -->
      <div class="scene" id="sc-follow">
        <div class="ec" id="outro-ec">
          <div id="outro-logo"></div>
          <div class="wm"><span class="s">stack</span><span class="t">tags</span></div>
          <div class="url">stacktags.io</div>
          <div class="follow-pill"><span class="fp-plus">+</span> Follow</div>
        </div>
      </div>

    </div><!-- /scenes -->

    <!-- subtitles mirror the narration -->
    <div class="stk-subs" id="subs"><span class="stk-subs-line" id="subs-line"></span></div>

  </div><!-- /stage -->
</div>

<!-- HUD (hidden in clean/capture mode) -->
<div id="hud">
  <button id="btn-play">▶ Play</button>
  <input id="seek" type="range" min="0" max="85" step="0.01" value="0" />
  <span id="tcode">0.0</span>
</div>

<audio id="vo" src="../script_voice.mp3" preload="auto"></audio>

<!-- default elements (used as components) -->
<script src="elements/text-popup.js"></script>
<script src="elements/outro.js"></script>

<!-- this video's choreography -->
<script src="app.js?v=1"></script>
</body>
</html>
