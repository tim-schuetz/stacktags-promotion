<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>stacktags — YouTube Thumbnails</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #1b1f23; }
  .thumb { position: relative; width: 1280px; height: 720px; overflow: hidden;
    font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .glow { position: absolute; border-radius: 50%; pointer-events: none; }
  .hl { font-weight: 900; letter-spacing: -0.03em; line-height: 0.98; margin: 0; color: #141a1e; }
  .accent { color: #3EAE93; }
  #root { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="app-screens.jsx"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
<script src="svg_globe.js"></script>
<script type="text/babel" src="thumbnails.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <DesignCanvas>
      <DCSection id="yt" title="YouTube-Thumbnails" subtitle="1280 × 720 · Motto: „The most competitive learning app in the world“ · alle mit App-UI">
        <DCArtboard id="a" label="A · Hell · Feed + Chart" width={1280} height={720}><ThumbA /></DCArtboard>
        <DCArtboard id="e" label="E · Most. Competitive. Learning." width={1280} height={720}><ThumbE /></DCArtboard>
        <DCArtboard id="f" label="F · Rising-Chart" width={1280} height={720}><ThumbF /></DCArtboard>
        <DCArtboard id="g" label="G · Rising-Chart · Feed-Phone" width={1280} height={720}><ThumbG /></DCArtboard>
        <DCArtboard id="h" label="H · Rising-Chart · Chess (HSK 4)" width={1280} height={720}><ThumbH /></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
